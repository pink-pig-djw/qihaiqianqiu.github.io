<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tokyo 3D · 全景漫游版</title>
<style>
  :root{
    --panel:rgba(24,26,30,.92);
    --panel-border:rgba(255,255,255,.08);
    --txt:#f2f4f7; --sub:#9aa3ae;
    --accent:#80c241;
    --hover:rgba(255,255,255,.07);
    --active:rgba(128,194,65,.18);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;font-family:"Hiragino Sans","PingFang SC","Noto Sans JP",system-ui,sans-serif;background:#101216;
    user-select:none;-webkit-user-select:none}
  #map{position:fixed;inset:0}
  #map canvas{display:block}

  .topbar{
    position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:20;
    background:var(--panel);backdrop-filter:blur(10px);
    border:1px solid var(--panel-border);border-radius:999px;
    padding:8px 16px;display:flex;align-items:center;gap:9px;
    color:var(--txt);font-size:12.5px;font-weight:700;white-space:nowrap;
    box-shadow:0 4px 20px rgba(0,0,0,.35);max-width:calc(100vw - 24px);
  }
  .topbar .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);flex:0 0 auto}
  .topbar span{color:var(--sub);font-weight:500;font-size:11px;overflow:hidden;text-overflow:ellipsis}

  .overview-btn{
    position:fixed;top:58px;left:50%;transform:translateX(-50%);z-index:20;
    background:var(--panel);backdrop-filter:blur(10px);
    border:1px solid var(--panel-border);border-radius:999px;
    padding:8px 18px;color:var(--txt);font-size:12.5px;font-weight:700;
    cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.3);
  }
  .overview-btn:active{transform:translateX(-50%) scale(.95)}

  .chip{
    position:fixed;top:100px;left:50%;transform:translateX(-50%);z-index:20;
    background:rgba(16,18,22,.88);backdrop-filter:blur(10px);
    border:1px solid var(--panel-border);border-radius:999px;
    padding:7px 16px;color:#fff;font-size:12.5px;font-weight:700;
    cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.35);
    display:none;align-items:center;gap:6px;white-space:nowrap;
  }
  .chip i{font-style:normal;color:var(--accent);font-size:11px}

  .panel{
    position:fixed;top:12px;left:12px;bottom:76px;z-index:21;
    width:260px;max-width:calc(100vw - 24px);
    background:var(--panel);backdrop-filter:blur(14px);
    border:1px solid var(--panel-border);border-radius:16px;
    display:flex;flex-direction:column;overflow:hidden;
    box-shadow:0 8px 32px rgba(0,0,0,.45);
    transition:transform .28s cubic-bezier(.2,.9,.3,1),opacity .28s;
  }
  .panel.hidden{transform:translateX(-115%);opacity:0;pointer-events:none}
  .panel header{padding:15px 16px 9px}
  .panel h1{color:var(--txt);font-size:15px;font-weight:800}
  .panel header p{color:var(--sub);font-size:10.5px;margin-top:3px}
  .search{margin:0 12px 9px;position:relative}
  .search input{
    width:100%;background:rgba(255,255,255,.07);border:1px solid var(--panel-border);
    border-radius:9px;padding:8px 12px 8px 30px;color:var(--txt);font-size:12.5px;outline:none;
  }
  .search input::placeholder{color:#6b7480}
  .search::before{content:"⌕";position:absolute;left:10px;top:50%;transform:translateY(-54%);color:#6b7480;font-size:15px}
  .lm-list{flex:1;overflow-y:auto;padding:0 8px 10px;scrollbar-width:thin;scrollbar-color:#3a3f46 transparent}
  .lm-list::-webkit-scrollbar{width:4px}
  .lm-list::-webkit-scrollbar-thumb{background:#3a3f46;border-radius:2px}
  .lm{display:flex;align-items:center;gap:11px;width:100%;background:none;border:none;border-radius:10px;padding:8px 9px;cursor:pointer;text-align:left}
  .lm:hover{background:var(--hover)}
  .lm.active{background:var(--active)}
  .lm .ic{width:33px;height:33px;border-radius:9px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--c,#444);box-shadow:inset 0 0 0 1px rgba(255,255,255,.12)}
  .lm b{display:block;color:var(--txt);font-size:12.5px;font-weight:700;line-height:1.25}
  .lm small{display:block;color:var(--sub);font-size:10px;margin-top:1.5px;line-height:1.3}
  .lm-empty{color:var(--sub);font-size:12px;text-align:center;padding:22px 0}

  .toolbar{
    position:fixed;bottom:calc(14px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);z-index:22;
    background:var(--panel);backdrop-filter:blur(12px);
    border:1px solid var(--panel-border);border-radius:999px;
    padding:5px;display:flex;gap:2px;
    box-shadow:0 6px 24px rgba(0,0,0,.45);max-width:calc(100vw - 16px);overflow-x:auto;scrollbar-width:none;
  }
  .toolbar::-webkit-scrollbar{display:none}
  .toolbar button{
    background:none;border:none;border-radius:999px;
    padding:9px 12px;color:var(--txt);font-size:12.5px;font-weight:700;
    cursor:pointer;white-space:nowrap;
  }
  .toolbar button:hover{background:var(--hover)}
  .toolbar button.on{background:var(--accent);color:#10210a}

  .zoomctl{
    position:fixed;right:12px;top:64px;z-index:20;
    display:flex;flex-direction:column;
    background:var(--panel);backdrop-filter:blur(10px);
    border:1px solid var(--panel-border);border-radius:10px;overflow:hidden;
    box-shadow:0 4px 14px rgba(0,0,0,.3);
  }
  .zoomctl button{width:36px;height:36px;background:none;border:none;color:var(--txt);font-size:17px;font-weight:700;cursor:pointer}
  .zoomctl button:hover{background:var(--hover)}
  .zoomctl button + button{border-top:1px solid var(--panel-border)}
  #compass svg{display:block;margin:auto}

  .scalebar{position:fixed;left:12px;bottom:calc(14px + env(safe-area-inset-bottom));z-index:18;color:#dfe5ec;font-size:10px;text-shadow:0 1px 3px rgba(0,0,0,.8)}
  .scalebar .bar{height:5px;border:1.5px solid #dfe5ec;border-top:none;margin-top:2px}

  .help{
    position:fixed;right:12px;bottom:calc(14px + env(safe-area-inset-bottom));z-index:19;
    background:var(--panel);backdrop-filter:blur(10px);
    border:1px solid var(--panel-border);border-radius:12px;
    padding:9px 12px;color:var(--sub);font-size:10.5px;line-height:1.8;
    box-shadow:0 4px 16px rgba(0,0,0,.3);
  }
  .help b{color:var(--txt);font-weight:700}
  @media (max-width:760px){ .help{display:none} .panel{width:min(260px,78vw)} }

  .pin{
    width:30px;height:30px;border-radius:50%;
    background:var(--c,#333);border:2.5px solid #fff;
    display:flex;align-items:center;justify-content:center;font-size:14px;
    box-shadow:0 3px 10px rgba(0,0,0,.45);cursor:pointer;pointer-events:auto;
  }
  #pins{position:fixed;inset:0;z-index:8;pointer-events:none}
  #pins .pin{position:absolute;transform:translate(-50%,-50%)}

  .card{
    position:fixed;z-index:23;right:12px;top:64px;
    width:288px;max-width:calc(100vw - 24px);
    background:var(--panel);backdrop-filter:blur(14px);
    border:1px solid var(--panel-border);border-radius:16px;
    box-shadow:0 12px 44px rgba(0,0,0,.5);
    padding:15px 17px 13px;
    transform:translateY(-8px);opacity:0;pointer-events:none;
    transition:all .25s cubic-bezier(.2,.9,.3,1);
  }
  .card.show{transform:none;opacity:1;pointer-events:auto}
  .card .tag{display:inline-block;font-size:9.5px;font-weight:800;letter-spacing:.12em;color:#10210a;background:var(--accent);border-radius:4px;padding:2px 7px;margin-bottom:7px}
  .card h2{color:var(--txt);font-size:16.5px;font-weight:800}
  .card h2 small{color:var(--sub);font-size:10px;font-weight:600;margin-left:7px;letter-spacing:.08em}
  .card .meta{display:flex;gap:18px;margin:8px 0 8px}
  .card .meta b{display:block;color:var(--txt);font-size:13.5px;font-family:Georgia,serif}
  .card .meta span{font-size:10px;color:var(--sub)}
  .card p{color:#c7ced6;font-size:11.5px;line-height:1.68}
  .card .x{position:absolute;top:10px;right:11px;border:none;background:rgba(255,255,255,.08);width:25px;height:25px;border-radius:50%;font-size:12px;color:var(--sub);cursor:pointer}
  @media (max-width:760px){
    .card{top:auto;bottom:76px;right:12px;left:12px;width:auto;margin:0 auto;max-width:380px}
    .zoomctl{top:58px}
  }

  /* ===== 漫游 UI ===== */
  #stick{
    position:fixed;left:20px;bottom:calc(86px + env(safe-area-inset-bottom));z-index:25;
    width:112px;height:112px;border-radius:50%;
    background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.18);
    display:none;touch-action:none;
  }
  #knob{
    position:absolute;left:50%;top:50%;width:46px;height:46px;border-radius:50%;
    background:rgba(255,255,255,.28);border:1.5px solid rgba(255,255,255,.4);
    transform:translate(-50%,-50%);
  }
  .altctl{
    position:fixed;right:14px;bottom:calc(86px + env(safe-area-inset-bottom));z-index:25;
    display:none;flex-direction:column;gap:8px;
  }
  .altctl button{
    width:46px;height:46px;border-radius:50%;
    background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);
    color:#fff;font-size:17px;touch-action:none;
  }
  body.roam.touch #stick{display:block}
  body.roam.touch .altctl{display:flex}
  #cross{
    position:fixed;left:50%;top:50%;width:5px;height:5px;border-radius:50%;
    background:rgba(255,255,255,.85);box-shadow:0 0 6px rgba(0,0,0,.6);
    transform:translate(-50%,-50%);z-index:7;display:none;pointer-events:none;
  }
  body.roam #cross{display:block}

  #boot{
    position:fixed;inset:0;z-index:60;background:#101216;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
    transition:opacity .5s;color:#9aa3ae;
  }
  #boot .ring{width:38px;height:38px;border-radius:50%;border:3px solid #2a2f3a;border-top-color:var(--accent);animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  #boot p{font-size:12px;letter-spacing:.3em}
  @media (prefers-reduced-motion:reduce){#boot .ring{animation:none}}
</style>
</head>
<body>
<div id="map"></div>
<div id="pins"></div>
<div id="cross"></div>

<div class="topbar"><i class="dot"></i>Tokyo 3D<span id="modeText">· 全景漫游版</span></div>
<button class="overview-btn" id="btnAll">🗾 东京全域</button>
<button class="chip" id="chip"><i>◂</i><span id="chipText"></span></button>

<aside class="panel" id="panel">
  <header><h1>飞往地标</h1><p>写实 3D 城市 · 60 处地标 · 回车飞达</p></header>
  <div class="search"><input id="q" type="text" placeholder="搜索地标…"></div>
  <div class="lm-list" id="list"></div>
</aside>

<div class="toolbar">
  <button id="btnPlaces" class="on">☰ 地标</button>
  <button id="btnRoam">🚶 漫游</button>
  <button id="btnTour">▶ 巡游</button>
  <button id="btnOrbit">⟳ 环绕</button>
  <button id="btnTop">⊕ 俯视</button>
  <button id="btnNight">🌙 夜景</button>
  <button id="btnSnow">❄ 雪景</button>
  <button id="btnRain">🌧 雨天</button>
  <button id="btnStyle">🏙 写实</button>
</div>

<div class="zoomctl">
  <button id="zin">＋</button>
  <button id="zout">－</button>
  <button id="compass" title="回正北">
    <svg width="18" height="18" viewBox="0 0 20 20" id="needle">
      <polygon points="10,2 13,11 10,9.4 7,11" fill="#e8492f"/>
      <polygon points="10,18 13,9 10,10.6 7,9" fill="#dfe5ec"/>
    </svg>
  </button>
</div>

<div class="scalebar"><span id="scaleTxt">2 km</span><div class="bar" id="scaleBar" style="width:80px"></div></div>

<div class="help" id="help">
  <b>滚轮 / 双指</b> 缩放 · <b>拖动</b> 平移<br>
  <b>右键拖动 / Ctrl+拖动</b> 旋转倾斜<br>
  点 <b>🚶 漫游</b> 进入自由飞行模式
</div>

<div id="stick"><div id="knob"></div></div>
<div class="altctl"><button id="altUp">▲</button><button id="altDn">▼</button></div>

<div class="card" id="card">
  <button class="x" id="cardX">✕</button>
  <span class="tag" id="cTag"></span>
  <h2><span id="cName"></span><small id="cJp"></small></h2>
  <div class="meta">
    <div><b id="cM1"></b><span id="cM1l"></span></div>
    <div><b id="cM2"></b><span id="cM2l"></span></div>
  </div>
  <p id="cDesc"></p>
</div>

<div id="boot"><div class="ring"></div><p>正在建造东京…</p></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* =====================================================================
   Tokyo 3D 全景漫游版
   · 写实立面(程序化窗格贴图 + 夜间窗灯) · 天空穹顶/云/太阳
   · 车流 + 山手线列车 · 动态水面
   · 轨道模式(地图操作) + 漫游模式(WASD/摇杆全方位飞行)
   1 单位 ≈ 10 米 · 高度×1.6 · 皇居为原点 · x东 z南
===================================================================== */
const $=id=>document.getElementById(id);
const isTouch='ontouchstart' in window;
if(isTouch) document.body.classList.add('touch');
const H=0.16;
const ORIGIN=[139.7528,35.6852];
const proj=(lng,lat)=>[(lng-ORIGIN[0])*9060,(ORIGIN[1]-lat)*11100];

/* ================= 地标 ================= */
const LANDMARKS=[
 {id:'tower',name:'东京塔',sub:'红白电波塔 · 332.9m',ico:'🗼',c:'#e8492f',ll:[139.74540,35.65858],z:16.4,pitch:66,br:-30,tag:'港区 芝公园',jp:'TOKYO TOWER',m1:['332.9 m','高度'],m2:['1958','落成'],d:'以埃菲尔铁塔为蓝本的红白钢塔,"国际橙"配色源自航空法规。夜晚的暖橙色"Landmark Light"是东京夜景的灵魂。'},
 {id:'skytree',name:'东京晴空塔',sub:'世界第一高塔 · 634m',ico:'🗼',c:'#5b8fc7',ll:[139.81070,35.71006],z:16.0,pitch:68,br:140,tag:'墨田区 押上',jp:'TOKYO SKYTREE',m1:['634 m','世界第一塔'],m2:['2012','落成'],d:'高度"634"取自旧国名"武藏"的谐音,塔身由三角形断面渐变为圆形,隔着隅田川与浅草老街相望。'},
 {id:'palace',name:'皇居',sub:'旧江户城 · 护城河环绕',ico:'🏯',c:'#3f7a4f',ll:[139.75280,35.68521],z:14.8,pitch:55,br:20,tag:'千代田区',jp:'IMPERIAL PALACE',m1:['≈1.15 km²','面积'],m2:['1457','江户城始建'],d:'坐落于旧江户城遗址,被护城河与石垣环绕的城市绿心。外苑二重桥是经典取景地,东御苑对公众开放。'},
 {id:'station',name:'东京站',sub:'红砖站房 · 新干线起点',ico:'🚉',c:'#9e4036',ll:[139.76712,35.68124],z:16.3,pitch:60,br:60,tag:'千代田区 丸之内',jp:'TOKYO STATION',m1:['1914','开业'],m2:['28条','站台线路'],d:'辰野金吾设计的红砖站房是大正建筑的象征,2012年复原了南北穹顶。每天约4000班列车从这里发着。'},
 {id:'shibuya',name:'涩谷十字路口',sub:'世界最繁忙的全向路口',ico:'🚦',c:'#ff5fa0',ll:[139.70050,35.65950],z:17.0,pitch:65,br:-150,tag:'涩谷区',jp:'SHIBUYA CROSSING',m1:['≈3000人','单次绿灯通行'],m2:['229 m','SHIBUYA SKY'],d:'一次绿灯最多约三千人同时穿行。旁边 SHIBUYA SCRAMBLE SQUARE 顶层的露天展望台可360°俯瞰这片人潮。'},
 {id:'tocho',name:'东京都厅',sub:'丹下健三双塔 · 243m',ico:'🏢',c:'#8d97a3',ll:[139.69170,35.68950],z:16.2,pitch:66,br:-60,tag:'新宿区 西新宿',jp:'TOKYO METRO. GOV.',m1:['243 m','高度'],m2:['1991','落成'],d:'双塔造型致敬巴黎圣母院,曾是日本第一高楼。45层免费展望台是俯瞰新宿楼群、远眺富士山的好位置。'},
 {id:'sensoji',name:'浅草寺',sub:'东京最古老寺院 · 雷门',ico:'🏮',c:'#c24532',ll:[139.79670,35.71480],z:16.5,pitch:58,br:0,tag:'台东区 浅草',jp:'SENSŌ-JI',m1:['628年','创建'],m2:['53.3 m','五重塔'],d:'挂着巨大红灯笼的雷门、仲见世商店街与五重塔构成江户风情的代表画面,与一河之隔的晴空塔古今同框。'},
 {id:'meiji',name:'明治神宫',sub:'都心の森 · 大鸟居',ico:'⛩️',c:'#4a3526',ll:[139.69930,35.67640],z:15.5,pitch:55,br:-120,tag:'涩谷区 代代木',jp:'MEIJI JINGU',m1:['1920','创建'],m2:['≈10万棵','人工镇守之森'],d:'供奉明治天皇,被一片由全国捐献树木育成的"永远之森"环绕,木造大鸟居之后是东京最安静的参道。'},
 {id:'rainbow',name:'彩虹大桥',sub:'东京湾悬索桥 · 798m',ico:'🌉',c:'#5a8fd4',ll:[139.76000,35.63600],z:14.6,pitch:62,br:160,tag:'港区 台场',jp:'RAINBOW BRIDGE',m1:['798 m','桥长'],m2:['1993','通车'],d:'横跨东京湾北部的双层悬索桥,夜间以白色灯光勾勒。从台场海滨公园回望,是湾岸夜景的代表构图。'},
 {id:'odaiba',name:'台场',sub:'填海未来街区 · 富士电视台',ico:'🛸',c:'#56b3a7',ll:[139.77450,35.62670],z:15.3,pitch:60,br:-20,tag:'港区 台场',jp:'ODAIBA',m1:['1853','台场炮台始建'],m2:['123 m','富士电视台球体'],d:'幕末为防御黑船而填海建造的炮台,如今是未来感湾岸街区,球体瞭望室的富士电视台总部是其标志。'},
 {id:'roppongi',name:'六本木之丘',sub:'森大厦 · 238m',ico:'🌆',c:'#7e8a98',ll:[139.72900,35.66050],z:16.2,pitch:64,br:45,tag:'港区 六本木',jp:'ROPPONGI HILLS',m1:['238 m','森大厦'],m2:['2003','落成'],d:'六本木新城的核心,52层的森美术馆与屋顶 SKY DECK 是同框收下东京塔与城市天际线的经典机位。'},

function canvasTex(w,h,draw){
  const cv=document.createElement('canvas');cv.width=w;cv.height=h;
  draw(cv.getContext('2d'),w,h);
  const t=new THREE.CanvasTexture(cv);
  t.wrapS=t.wrapT=THREE.RepeatWrapping;
  t.anisotropy=4;
  return t;
}
/* 立面:cell=16px ≈ 3.5m → 一个贴图周期 256px ≈ 56m = 5.6 单位 */

function facadeDay(style){
  return canvasTex(256,256,(x)=>{
    if(style==='office'){
      x.fillStyle='#a8b4be';x.fillRect(0,0,256,256);
      for(let r=0;r<16;r++)for(let c=0;c<16;c++){
        const px=c*16,py=r*16;
        const g=x.createLinearGradient(px,py,px,py+13);
        const sky=170+Math.random()*40;
        g.addColorStop(0,`rgb(${sky-40},${sky-18},${sky+8})`);
        g.addColorStop(1,`rgb(${sky-80},${sky-60},${sky-40})`);
        x.fillStyle=g;x.fillRect(px+1.5,py+1.5,13,12);
      }
    }else{
      x.fillStyle='#cfc9bd';x.fillRect(0,0,256,256);
      x.fillStyle='#bfb9ac';
      for(let r=0;r<16;r++)x.fillRect(0,r*16,256,2);
      for(let r=0;r<16;r++)for(let c=0;c<16;c++){
        const lum=Math.random();
        x.fillStyle=lum<0.12?'#dfe6ea':`rgb(${52+lum*30},${60+lum*30},${70+lum*30})`;
        x.fillRect(c*16+3.5,r*16+4,9,8.5);
      }
    }
    /* 左上角 12px 作屋顶色块(顶面 UV 指向这里) */
    x.fillStyle=style==='office'?'#8f979e':'#b3ada1';
    x.fillRect(0,0,13,13);
  });
}

function distToSeg(x,z,ax,az,bx,bz){
  const vx=bx-ax,vz=bz-az;
  let t=((x-ax)*vx+(z-az)*vz)/(vx*vx+vz*vz||1);
  t=Math.max(0,Math.min(1,t));
  return Math.hypot(x-(ax+vx*t),z-(az+vz*t));
}
function distToPath(x,z,pts,loop){
  let d=1e9;
  const n=pts.length;
  for(let i=0;i<(loop?n:n-1);i++){
    const a=pts[i],b=pts[(i+1)%n];
    d=Math.min(d,distToSeg(x,z,a[0],a[1],b[0],b[1]));
    if(d<0.001)break;
  }
  return d;
}

function inPoly(x,z,poly){
  let c=false;
  for(let i=0,j=poly.length-1;i<poly.length;j=i++){
    const [xi,zi]=poly[i],[xj,zj]=poly[j];
    if(((zi>z)!==(zj>z))&&(x<(xj-xi)*(z-zi)/(zj-zi)+xi))c=!c;
  }
  return c;
}

function ribbon(pts,w,y,material,uvScale){
  const verts=[],idx=[],uvs=[];
  for(let i=0;i<pts.length;i++){
    const [x,z]=pts[i];
    const [px,pz]=pts[Math.max(0,i-1)],[nx,nz]=pts[Math.min(pts.length-1,i+1)];
    let dx=nx-px,dz=nz-pz;const L=Math.hypot(dx,dz)||1;dx/=L;dz/=L;
    verts.push(x-dz*w,0,z+dx*w, x+dz*w,0,z-dx*w);
    uvs.push(i*(uvScale||2.4),0, i*(uvScale||2.4),0.6);
  }
  for(let i=0;i<pts.length-1;i++){const a=i*2;idx.push(a,a+1,a+2,a+1,a+3,a+2);}
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(verts,3));
  g.setAttribute('uv',new THREE.Float32BufferAttribute(uvs,2));
  g.setIndex(idx);g.computeVertexNormals();
  const m=new THREE.Mesh(g,material);m.position.y=y;scene.add(m);
  return m;
}

function buildGroundRoad(pts,w){
  for(let i=0;i<pts.length-1;i++){
    const [x1,z1]=pts[i],[x2,z2]=pts[i+1];
    const L=Math.hypot(x2-x1,z2-z1),ang=-Math.atan2(z2-z1,x2-x1);
    const mx=(x1+x2)/2,mz=(z1+z2)/2;
    const overWater=isWater(mx,mz)||isWater(x1+(x2-x1)*0.25,z1+(z2-z1)*0.25)||isWater(x1+(x2-x1)*0.75,z1+(z2-z1)*0.75);
    const t=roadTex.clone();t.needsUpdate=true;t.wrapS=THREE.RepeatWrapping;t.repeat.set(L/24,1);
    const yy=overWater?1.5:0.02;
    const m=new THREE.Mesh(new THREE.BoxGeometry(L,overWater?0.7:0.24,w),new THREE.MeshLambertMaterial({map:t}));
    m.position.set(mx,yy,mz);m.rotation.y=ang;
    m.receiveShadow=true;m.castShadow=overWater;scene.add(m);roadMeshes.push(m);
    if(overWater){ // 跨河桥:护栏 + 桥台
      [-1,1].forEach(sd=>{
        const rail=new THREE.Mesh(new THREE.BoxGeometry(L,0.6,0.18),mat(0xc8ccd0));
        rail.position.set(mx-Math.sin(ang)*sd*(w/2-0.1),yy+0.6,mz-Math.cos(ang)*sd*(w/2-0.1));
        rail.rotation.y=ang;scene.add(rail);
      });
      [[x1,z1],[x2,z2]].forEach(([ex,ez])=>{
        const ab=new THREE.Mesh(new THREE.BoxGeometry(2.2,1.6,w+0.6),mat(0xa8a298));
        ab.position.set(ex,0.8,ez);ab.rotation.y=ang;scene.add(ab);
      });
    }
    if(!overWater){ /* 人行道 + 路缘石 */
      [-1,1].forEach(sd=>{
        const sw=new THREE.Mesh(new THREE.BoxGeometry(L,0.3,1.7),mat(0xc4beb0));
        sw.position.set(mx-Math.sin(ang)*sd*(w/2+0.95),0.03,mz-Math.cos(ang)*sd*(w/2+0.95));
        sw.rotation.y=ang;sw.receiveShadow=true;scene.add(sw);
        const curb=new THREE.Mesh(new THREE.BoxGeometry(L,0.34,0.16),mat(0xdedad0));
        curb.position.set(mx-Math.sin(ang)*sd*(w/2+0.12),0.04,mz-Math.cos(ang)*sd*(w/2+0.12));
        curb.rotation.y=ang;scene.add(curb);
      });
    }
    /* 端头与折点封圆 */
    const j=new THREE.Mesh(new THREE.CylinderGeometry(w/2,w/2,0.24,12),jointMat);
    j.position.set(x1,0.02,z1);scene.add(j);roadMeshes.push(j);
    if(i===pts.length-2){
      const j2=new THREE.Mesh(new THREE.CylinderGeometry(w/2,w/2,0.24,12),jointMat);
      j2.position.set(x2,0.02,z2);scene.add(j2);roadMeshes.push(j2);
    }
  }
}

function buildExpressway(pts,loop){
  const w=6.4,y=7.2;
  const n=pts.length,segN=loop?n:n-1;
  for(let i=0;i<segN;i++){
    const [x1,z1]=pts[i],[x2,z2]=pts[(i+1)%n];
    const L=Math.hypot(x2-x1,z2-z1),ang=-Math.atan2(z2-z1,x2-x1);
    const mx=(x1+x2)/2,mz=(z1+z2)/2;
    const deck=new THREE.Mesh(new THREE.BoxGeometry(L,0.55,w),expwyMat);
    deck.position.set(mx,y,mz);deck.rotation.y=ang;deck.castShadow=true;
    scene.add(deck);

      const rail=new THREE.Mesh(new THREE.BoxGeometry(L,0.8,0.28),expwyRail);
      rail.position.set(mx-Math.sin(ang)*sd*(w/2-0.2),y+0.65,mz-Math.cos(ang)*sd*(w/2-0.2));
      rail.rotation.y=ang;scene.add(rail);

    const j=new THREE.Mesh(new THREE.CylinderGeometry(w/2,w/2,0.55,10),expwyMat);
    j.position.set(x1,y,z1);scene.add(j);
    /* 桥墩 */
    const piers=Math.max(1,Math.round(L/27));

      pier.position.set(px,y/2,pz);pier.castShadow=true;scene.add(pier);
    }
  }
}

/* ---- 车流:沿路径连续行驶 ---- */
function makeDrivePath(pts,loop,y){
  const segs=[];let total=0;
  const n=pts.length,segN=loop?n:n-1;
  for(let i=0;i<segN;i++){
    const a=pts[i],b=pts[(i+1)%n];
    const L=Math.hypot(b[0]-a[0],b[1]-a[1]);
    segs.push({a,b,L,s0:total});total+=L;
  }
  return {segs,total,y,
    at(d){
      d=((d%this.total)+this.total)%this.total;
      let seg=this.segs[0];
      for(const sg of this.segs){if(d>=sg.s0&&d<=sg.s0+sg.L){seg=sg;break;}}
      const t=(d-seg.s0)/seg.L;
      return {x:seg.a[0]+(seg.b[0]-seg.a[0])*t,z:seg.a[1]+(seg.b[1]-seg.a[1])*t,
              ang:-Math.atan2(seg.b[1]-seg.a[1],seg.b[0]-seg.a[0])};
    }};
}

function updateCars(dt){
  const M=new THREE.Matrix4(),Q=new THREE.Quaternion(),P=new THREE.Vector3(),S=new THREE.Vector3(1,1,1),up=new THREE.Vector3(0,1,0);
  for(let i=0;i<CARN;i++){
    const c=cars[i];
    c.d+=c.dir*c.v*dt;
    const q=c.path.at(c.d);
    const off=c.dir>0?1.5:-1.5;
    P.set(q.x-Math.sin(q.ang)*off,c.path.y-0.3,q.z-Math.cos(q.ang)*off);
    Q.setFromAxisAngle(up,q.ang+(c.dir<0?Math.PI:0));
    M.compose(P,Q,S);
    carMesh.setMatrixAt(i,M);
    wheelMesh.setMatrixAt(i,M);
  }
  carMesh.instanceMatrix.needsUpdate=true;
  wheelMesh.instanceMatrix.needsUpdate=true;
}

function updateBuses(dt){
  buses.forEach(b=>{
    b.d+=b.dir*6.5*dt;
    const q=b.path.at(b.d);
    const off=b.dir>0?1.6:-1.6;
    b.g.position.set(q.x-Math.sin(q.ang)*off,0.25,q.z-Math.cos(q.ang)*off);

/* ================= 街道细节:路灯·红绿灯·斑马线·护栏·便利店·贩卖机·公交站 ================= */
function segIntersect(a1,a2,b1,b2){
  const d1x=a2[0]-a1[0],d1z=a2[1]-a1[1],d2x=b2[0]-b1[0],d2z=b2[1]-b1[1];
  const den=d1x*d2z-d1z*d2x;
  if(Math.abs(den)<1e-6)return null;
  const t=((b1[0]-a1[0])*d2z-(b1[1]-a1[1])*d2x)/den;
  const u=((b1[0]-a1[0])*d1z-(b1[1]-a1[1])*d1x)/den;
  if(t<0.04||t>0.96||u<0.04||u>0.96)return null;
  return [a1[0]+d1x*t,a1[1]+d1z*t];
}
const crossings=[];
for(let i=0;i<AVENUES.length;i++)for(let j=i+1;j<AVENUES.length;j++){
  const A=AVENUES[i].pts,B=AVENUES[j].pts;
  for(let a=0;a<A.length-1;a++)for(let b=0;b<B.length-1;b++){
    const pt=segIntersect(A[a],A[a+1],B[b],B[b+1]);
    if(!pt)continue;
    if(Math.hypot(pt[0],pt[1])>760)continue;
    if(crossings.some(c=>Math.hypot(c[0]-pt[0],c[1]-pt[1])<14))continue;
    crossings.push(pt);
  }
}

(function(){
  const poles=[],heads=[];
  AVENUES.forEach(a=>{
    for(let i=0;i<a.pts.length-1;i++){
      const [x1,z1]=a.pts[i],[x2,z2]=a.pts[i+1];
      const L=Math.hypot(x2-x1,z2-z1),steps=Math.floor(L/26);
      const nx=-(z2-z1)/L,nz=(x2-x1)/L;
      for(let k=1;k<=steps;k++){
        const t=k/(steps+1);
        const side=k%2?1:-1;
        const px=x1+(x2-x1)*t+nx*side*(a.w/2+1.1);
        const pz=z1+(z2-z1)*t+nz*side*(a.w/2+1.1);
        if(Math.hypot(px,pz)>900)continue;
        poles.push([px,2.3,pz]);heads.push([px,4.65,pz]);
        lampPts.push([px,4.7,pz]);

  const pm=new THREE.InstancedMesh(lampPoleGeo,mat(0x6e7378),poles.length);
  const hm=new THREE.InstancedMesh(lampHeadGeo,lampHeadMat,heads.length);

  poles.forEach((q,i)=>{M.makeTranslation(q[0],q[1],q[2]);pm.setMatrixAt(i,M);});
  heads.forEach((q,i)=>{M.makeTranslation(q[0],q[1],q[2]);hm.setMatrixAt(i,M);});

/* ================= 霓虹招牌系统(写实/夜景核心) ================= */
function neonTexture(vert){
  const W=vert?96:256,Hh=vert?256:96;
  return canvasTex(W,Hh,(x)=>{
    x.fillStyle='#14161c';x.fillRect(0,0,W,Hh);
    const pal=['#ff4f6e','#3fb6ff','#ffd23f','#7dff5f','#ff8f3f','#d46fff','#4ffff0'];
    const blocks=vert?6:4;
    for(let b=0;b<blocks;b++){
      const c=pal[Math.floor(Math.random()*pal.length)];
      const bx0=vert?8:8+b*60,by0=vert?8+b*40:10;
      const bw=vert?80:52,bh=vert?34:70;
      if(Math.random()<0.4){x.fillStyle=c;x.fillRect(bx0,by0,bw,bh);x.fillStyle='#14161c';}
      else x.fillStyle=c;
      /* 伪字形笔画 */
      x.strokeStyle=Math.random()<0.4?'#fff':c;x.lineWidth=3;x.lineCap='round';
      for(let st=0;st<5;st++){
        x.beginPath();
        const sx=bx0+4+Math.random()*(bw-8),sy=by0+4+Math.random()*(bh-8);
        x.moveTo(sx,sy);
        x.lineTo(sx+(Math.random()-0.5)*bw*0.7,sy+(Math.random()-0.5)*bh*0.7);
        x.stroke();
      }
    }
  });
}

/* ================= 铁路系统:JR高架 + 站台 + 地铁 ================= */
const viaductMat=new THREE.MeshLambertMaterial({color:0xb8b2a6});
const viaductWall=new THREE.MeshLambertMaterial({color:0xc6c0b4});
const ballastMat=new THREE.MeshLambertMaterial({color:0x5a544c});
const railSteel=new THREE.MeshLambertMaterial({color:0x3a3d42});
function buildViaduct(pts,loop,lineColor){
  const w=5.4,y=4.2;
  const stripeMat=lineColor?new THREE.MeshBasicMaterial({color:lineColor}):null;
  const n=pts.length,segN=loop?n:n-1;
  for(let i=0;i<segN;i++){
    const [x1,z1]=pts[i],[x2,z2]=pts[(i+1)%n];
    const L=Math.hypot(x2-x1,z2-z1),ang=-Math.atan2(z2-z1,x2-x1);
    const mx=(x1+x2)/2,mz=(z1+z2)/2;
    const deck=new THREE.Mesh(new THREE.BoxGeometry(L,0.7,w),viaductMat);
    deck.position.set(mx,y,mz);deck.rotation.y=ang;deck.castShadow=true;scene.add(deck);
    const bal=new THREE.Mesh(new THREE.BoxGeometry(L,0.16,w-1.4),ballastMat);
    bal.position.set(mx,y+0.43,mz);bal.rotation.y=ang;scene.add(bal);
    [-1,1].forEach(sd=>{ /* 侧墙 + 线色饰带 + 结构肋 */
      const wall=new THREE.Mesh(new THREE.BoxGeometry(L,0.6,0.2),viaductWall);
      wall.position.set(mx-Math.sin(ang)*sd*(w/2-0.12),y+0.65,mz-Math.cos(ang)*sd*(w/2-0.12));
      wall.rotation.y=ang;scene.add(wall);
      if(stripeMat){
        const st=new THREE.Mesh(new THREE.BoxGeometry(L,0.22,0.24),stripeMat);
        st.position.set(mx-Math.sin(ang)*sd*(w/2-0.12),y+1.02,mz-Math.cos(ang)*sd*(w/2-0.12));
        st.rotation.y=ang;scene.add(st);
      }
      const ribs=Math.max(1,Math.round(L/12));
      for(let r2=1;r2<ribs;r2++){
        const tt=r2/ribs;
        const rib=new THREE.Mesh(new THREE.BoxGeometry(0.22,1.1,0.26),viaductMat);
        rib.position.set(x1+(x2-x1)*tt-Math.sin(ang)*sd*(w/2-0.1),y+0.2,z1+(z2-z1)*tt-Math.cos(ang)*sd*(w/2-0.1));
        rib.rotation.y=ang;scene.add(rib);
      }
      /* 双钢轨 */
      const rail=new THREE.Mesh(new THREE.BoxGeometry(L,0.1,0.12),railSteel);
      rail.position.set(mx-Math.sin(ang)*sd*0.85,y+0.56,mz-Math.cos(ang)*sd*0.85);
      rail.rotation.y=ang;scene.add(rail);
    });
    const j=new THREE.Mesh(new THREE.CylinderGeometry(w/2,w/2,0.7,10),viaductMat);
    j.position.set(x1,y,z1);scene.add(j);
    const piers=Math.max(1,Math.round(L/24));
    for(let k=1;k<=piers;k++){
      const tt=k/(piers+1);
      const pier=new THREE.Mesh(new THREE.BoxGeometry(1.3,y,2.6),viaductMat);
      pier.position.set(x1+(x2-x1)*tt,y/2,z1+(z2-z1)*tt);
      pier.rotation.y=ang;pier.castShadow=true;scene.add(pier);
      const cap=new THREE.Mesh(new THREE.BoxGeometry(1.7,0.5,w+0.4),viaductMat);
      cap.position.set(x1+(x2-x1)*tt,y-0.45,z1+(z2-z1)*tt);
      cap.rotation.y=ang;scene.add(cap);
    }
    /* 接触网杆 */
    const cps=Math.max(1,Math.round(L/22));
    for(let k=0;k<=cps;k++){
      const tt=k/cps;
      const cp=new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.08,3.2,4),railSteel);
      cp.position.set(x1+(x2-x1)*tt-Math.sin(ang)*(w/2-0.3),y+2.0,z1+(z2-z1)*tt-Math.cos(ang)*(w/2-0.3));
      scene.add(cp);
    }
  }
}

function archWalls(pts,loop){

    const [x1,z1]=pts[i],[x2,z2]=pts[(i+1)%n];

function makeCartoInner(night){
  const SIZE=2048,EXT=1200,S=SIZE/(EXT*2);
  const P=night
    ?{bg:'#20242d',blk:'#262b35',water:'#11304b',park:'#1d3424',pkOut:'#2c4a35',minor:'#3c4554',minorC:'#2a3140',major:'#6e5b2c',majorC:'#4a3e22',hwy:'#7a5a86',rail:'#5a6470',label:'#aeb7c2',halo:'#20242d'}
    :{bg:'#f2efe9',blk:'#eae6dd',water:'#a6d2f2',park:'#c9e6ae',pkOut:'#aed391',minor:'#ffffff',minorC:'#d8d3c9',major:'#fcd66e',majorC:'#e0b14b',hwy:'#c98fd4',rail:'#9aa0a8',label:'#5d6168',halo:'#f2efe9'};
  return canvasTex(SIZE,SIZE,(x)=>{
    const X=u=>(u+EXT)*S,Y=v=>(v+EXT)*S;
    x.fillStyle=P.bg;x.fillRect(0,0,SIZE,SIZE);
    /* 街区底色微差 */
    for(let i=0;i<400;i++){
      x.fillStyle=P.blk;x.globalAlpha=0.5;
      x.fillRect(Math.random()*SIZE,Math.random()*SIZE,30+Math.random()*80,30+Math.random()*80);
    }
    x.globalAlpha=1;
    /* 水体 */
    x.fillStyle=P.water;
    x.beginPath();x.moveTo(X(bayPoly[0][0]),Y(bayPoly[0][1]));
    bayPoly.slice(1).forEach(q=>x.lineTo(X(q[0]),Y(q[1])));x.closePath();x.fill();
    islands.forEach(([ix,iz,ir])=>{x.fillStyle=P.bg;x.beginPath();x.arc(X(ix),Y(iz),ir*S,0,7);x.fill();});
    x.lineJoin='round';x.lineCap='round';
    RIVERS.forEach(r=>{
      /* 河岸绿带 */
      x.strokeStyle=P.park;x.lineWidth=(r.w+8)*2*S;
      x.beginPath();r.pts.forEach((q,i)=>i?x.lineTo(X(q[0]),Y(q[1])):x.moveTo(X(q[0]),Y(q[1])));x.stroke();
      /* 水面 */
      x.strokeStyle=P.water;x.lineWidth=r.w*2*S;
      x.beginPath();r.pts.forEach((q,i)=>i?x.lineTo(X(q[0]),Y(q[1])):x.moveTo(X(q[0]),Y(q[1])));x.stroke();
    });
    x.strokeStyle=P.water;x.lineWidth=14*S;x.beginPath();x.ellipse(X(0),Y(0),95*S,81*S,0,0,7);x.stroke();
    /* 公园 */
    parks.forEach(([px,pz,r])=>{
      x.fillStyle=P.park;x.beginPath();x.arc(X(px),Y(pz),r*S,0,7);x.fill();

    });
    /* 次级街道网 */
    const step=15;

    x.lineCap='butt';
    [[P.minorC,2.3],[P.minor,1.3]].forEach(([col,wd])=>{
      x.strokeStyle=col;x.lineWidth=wd;x.beginPath();
      for(let gx=-EXT+step;gx<EXT;gx+=step)
        for(let gz=-EXT;gz<EXT-step;gz+=step)
          if(landSeg(gx,gz,gx,gz+step)){x.moveTo(X(gx),Y(gz));x.lineTo(X(gx),Y(gz+step));}

        for(let gx=-EXT;gx<EXT-step;gx+=step)
          if(landSeg(gx,gz,gx+step,gz)){x.moveTo(X(gx),Y(gz));x.lineTo(X(gx+step),Y(gz));}
      x.stroke();
    });
    /* 主干道(连续折线) */
    x.lineCap='round';x.lineJoin='round';

    x.beginPath();yp.forEach((q,i)=>i?x.lineTo(X(q[0]),Y(q[1])):x.moveTo(X(q[0]),Y(q[1])));x.closePath();x.stroke();
    x.setLineDash([]);
    x.strokeStyle=P.rail;x.lineWidth=2.6;
    x.beginPath();CHUO_PTS.forEach((q,i)=>i?x.lineTo(X(q[0]),Y(q[1])):x.moveTo(X(q[0]),Y(q[1])));x.stroke();
    x.strokeStyle=night?'#f5a623':'#f39700';x.lineWidth=2;
    x.beginPath();GINZA_LINE.forEach((q,i)=>i?x.lineTo(X(q[0]),Y(q[1])):x.moveTo(X(q[0]),Y(q[1])));x.stroke();
    x.strokeStyle=night?'#ff4d5e':'#e60012';x.lineWidth=2;
    x.beginPath();MARU_LINE.forEach((q,i)=>i?x.lineTo(X(q[0]),Y(q[1])):x.moveTo(X(q[0]),Y(q[1])));x.stroke();
    [[HIBIYA,'#9caeb7'],[TOZAI,'#009bbf'],[CHIYODA,'#00bb85']].forEach(([ln,c])=>{
      x.strokeStyle=c;x.lineWidth=2;
      x.beginPath();ln.forEach((q,i)=>i?x.lineTo(X(q[0]),Y(q[1])):x.moveTo(X(q[0]),Y(q[1])));x.stroke();

  return canvasTex(SIZE,SIZE,(x)=>{
    const X=u=>(u+EXT)*S,Y=v=>(v+EXT)*S;
    /* 按街区块填充地块色,形成肌理 */
    const step=15;
    for(let gz=-EXT;gz<EXT;gz+=step)

        x.fillStyle=P.blk[((gx*7+gz*13)%P.blk.length+P.blk.length)%P.blk.length];
        x.fillRect(X(gx),Y(gz),step*S+1,step*S+1);

    /* 水与绿底色 */
    x.fillStyle=P.water;

    x.lineWidth=0.9;x.beginPath();
    for(let gx=-EXT+step/2;gx<EXT;gx+=step)

    for(let gz=-EXT+step/2;gz<EXT;gz+=step)

        if(landSeg(gx,gz,gx+step,gz)&&((gz+EXT)/step|0)%2===1){x.moveTo(X(gx),Y(gz));x.lineTo(X(gx+step),Y(gz));}
    x.stroke();

let mode='orbit';
const ctl={target:new THREE.Vector3(0,0,120),theta:0,phi:0.9,dist:1250};
const LIMS={phiMin:0.10,phiMax:1.49,dMin:30,dMax:7200};
const roam={pos:new THREE.Vector3(-60,18,420),yaw:0,pitch:-0.05,speed:16};
let flight=null,orbitOn=false,orbitSpeed=1;

function syncOrbitCam(){
  ctl.phi=Math.max(LIMS.phiMin,Math.min(LIMS.phiMax,ctl.phi));
  ctl.dist=Math.max(LIMS.dMin,Math.min(LIMS.dMax,ctl.dist));
  const sp=Math.sin(ctl.phi);
  camera.position.set(
    ctl.target.x+ctl.dist*sp*Math.sin(ctl.theta),
    ctl.target.y+ctl.dist*Math.cos(ctl.phi),
    ctl.target.z+ctl.dist*sp*Math.cos(ctl.theta));
  camera.lookAt(ctl.target);
}
function syncRoamCam(){
  roam.pitch=Math.max(-1.5,Math.min(1.5,roam.pitch));
  roam.pos.y=Math.max(0.35,Math.min(900,roam.pos.y));
  roam.pos.x=Math.max(-3000,Math.min(3000,roam.pos.x));
  roam.pos.z=Math.max(-3000,Math.min(3000,roam.pos.z));
  camera.position.copy(roam.pos);
  camera.rotation.order='YXZ';
  camera.rotation.set(roam.pitch,roam.yaw,0);
}

/* ---- 模式切换 ---- */
function enterRoam(){
  if(mode==='roam')return;
  stopMotion();flight=null;
  /* 从当前轨道视角无缝接管 */
  roam.pos.copy(camera.position);
  const d=new THREE.Vector3();camera.getWorldDirection(d);
  roam.yaw=Math.atan2(-d.x,-d.z);
  roam.pitch=Math.asin(Math.max(-1,Math.min(1,d.y)));
  mode='roam';
  document.body.classList.add('roam');
  $('btnRoam').classList.add('on');$('btnRoam').textContent='🛰 轨道';
  $('help').innerHTML=isTouch
    ?'<b>左摇杆</b> 移动 · <b>右侧拖动</b> 转视角<br><b>▲▼</b> 升降 · 点 <b>🛰 轨道</b> 返回地图模式'
    :'<b>W A S D</b> 移动 · <b>拖动</b> 转视角(360°)<br><b>Space / C</b> 升降 · <b>Shift</b> 加速 · <b>滚轮</b> 调速<br>点 <b>🛰 轨道</b> 返回地图模式';
  setMode('· 漫游模式 · 全方位自由飞行');
}
function exitRoam(){
  if(mode!=='roam')return;
  mode='orbit';
  document.body.classList.remove('roam');
  $('btnRoam').classList.remove('on');$('btnRoam').textContent='🚶 漫游';
  /* 在前方地面落一个轨道目标 */
  const fx=-Math.sin(roam.yaw),fz=-Math.cos(roam.yaw);
  const ahead=Math.max(roam.pos.y*1.2,80);
  ctl.target.set(roam.pos.x+fx*ahead,0,roam.pos.z+fz*ahead);
  ctl.dist=Math.max(60,roam.pos.distanceTo(ctl.target));
  ctl.theta=Math.atan2(roam.pos.x-ctl.target.x,roam.pos.z-ctl.target.z);
  ctl.phi=Math.acos(Math.max(-1,Math.min(1,roam.pos.y/ctl.dist)));
  $('help').innerHTML='<b>滚轮 / 双指</b> 缩放 · <b>拖动</b> 平移<br><b>右键拖动 / Ctrl+拖动</b> 旋转倾斜<br>点 <b>🚶 漫游</b> 进入自由飞行模式';
  setMode('· 全景漫游版');
}
$('btnRoam').onclick=()=>{mode==='roam'?exitRoam():enterRoam();};

const el=renderer.domElement;
let drag=null;
const touches=new Map();let pinch0=0,pinchD0=0,mid0=null,rot0=0,theta0=0;
el.addEventListener('pointerdown',e=>{
  if(e.pointerType==='touch'&&mode==='roam')return; // 漫游触屏走 touch 事件
  el.setPointerCapture(e.pointerId);
  drag={x:e.clientX,y:e.clientY,btn:e.button};
  flight=null;userInterrupt();
});
el.addEventListener('pointermove',e=>{
  if(!drag||touches.size>=2)return;
  const dx=e.clientX-drag.x,dy=e.clientY-drag.y;
  if(mode==='roam'){
    roam.yaw-=dx*0.0026;roam.pitch-=dy*0.0022;
  }else if(drag.btn===2||e.ctrlKey||e.shiftKey){
    ctl.theta-=dx*0.0052;ctl.phi-=dy*0.0042;
  }else pan(dx,dy);
  drag.x=e.clientX;drag.y=e.clientY;
});
el.addEventListener('pointerup',()=>drag=null);
el.addEventListener('contextmenu',e=>e.preventDefault());
el.addEventListener('wheel',e=>{
  e.preventDefault();
  if(mode==='roam'){
    roam.speed=Math.max(3,Math.min(120,roam.speed*(e.deltaY>0?0.85:1.18)));
  }else{
    flight=null;userInterrupt();
    ctl.dist*=(1+Math.sign(e.deltaY)*0.09);
  }
},{passive:false});

/* ---- 输入:触屏(轨道模式双指 / 漫游模式视角) ---- */
let lookTouch=null;
el.addEventListener('touchstart',e=>{
  for(const t of e.changedTouches){
    touches.set(t.identifier,{x:t.clientX,y:t.clientY});
    if(mode==='roam'&&lookTouch===null){lookTouch=t.identifier;}
  }
  if(mode==='orbit'&&touches.size===2){
    const [a,b]=[...touches.values()];
    pinchD0=Math.hypot(a.x-b.x,a.y-b.y);pinch0=ctl.dist;
    mid0={x:(a.x+b.x)/2,y:(a.y+b.y)/2};
    rot0=Math.atan2(b.y-a.y,b.x-a.x);theta0=ctl.theta;
  }
},{passive:true});
el.addEventListener('touchmove',e=>{
  for(const t of e.changedTouches){
    const o=touches.get(t.identifier);
    if(!o)continue;
    if(mode==='roam'&&t.identifier===lookTouch){
      roam.yaw-=(t.clientX-o.x)*0.0036;
      roam.pitch-=(t.clientY-o.y)*0.0030;
    }
    o.x=t.clientX;o.y=t.clientY;
  }
  if(mode==='orbit'&&touches.size===2){
    e.preventDefault();flight=null;
    const [a,b]=[...touches.values()];
    ctl.dist=pinch0*(pinchD0/Math.max(40,Math.hypot(a.x-b.x,a.y-b.y)));
    ctl.theta=theta0+(Math.atan2(b.y-a.y,b.x-a.x)-rot0);
    const mid={x:(a.x+b.x)/2,y:(a.y+b.y)/2};
    ctl.phi-=(mid.y-mid0.y)*0.005;
    mid0=mid;
  }
},{passive:false});
el.addEventListener('touchend',e=>{
  for(const t of e.changedTouches){
    touches.delete(t.identifier);
    if(t.identifier===lookTouch)lookTouch=null;
  }
});
function pan(dx,dy){
  const k=ctl.dist*0.0011;
  const fx=Math.sin(ctl.theta),fz=Math.cos(ctl.theta);
  ctl.target.x-=(dx*fz-dy*(-fx))*k;
  ctl.target.z-=(-dx*fx-dy*(-fz))*k;
  ctl.target.x=Math.max(-1500,Math.min(1500,ctl.target.x));
  ctl.target.z=Math.max(-1500,Math.min(1700,ctl.target.z));
}

/* ---- 输入:键盘 ---- */
const keys={};
addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(mode==='roam'&&['Space','KeyW','KeyA','KeyS','KeyD','KeyC','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault();
});
addEventListener('keyup',e=>keys[e.code]=false);

/* ---- 输入:虚拟摇杆 ---- */
const stickState={x:0,y:0,id:null};
const stick=$('stick'),knob=$('knob');
stick.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.changedTouches[0];stickState.id=t.identifier;
},{passive:false});
stick.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier!==stickState.id)continue;
    const r=stick.getBoundingClientRect();
    let dx=t.clientX-(r.left+r.width/2),dy=t.clientY-(r.top+r.height/2);
    const m=Math.hypot(dx,dy),max=40;
    if(m>max){dx*=max/m;dy*=max/m;}
    stickState.x=dx/max;stickState.y=dy/max;
    knob.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;
  }
},{passive:false});
const stickEnd=e=>{
  for(const t of e.changedTouches){
    if(t.identifier!==stickState.id)continue;
    stickState.id=null;stickState.x=stickState.y=0;
    knob.style.transform='translate(-50%,-50%)';
  }
};
stick.addEventListener('touchend',stickEnd);
stick.addEventListener('touchcancel',stickEnd);
let altDir=0;
[['altUp',1],['altDn',-1]].forEach(([id,d])=>{
  const b=$(id);
  const on=e=>{e.preventDefault();altDir=d;};
  const off=e=>{e.preventDefault();if(altDir===d)altDir=0;};
  b.addEventListener('touchstart',on,{passive:false});
  b.addEventListener('touchend',off);b.addEventListener('touchcancel',off);
  b.addEventListener('mousedown',on);addEventListener('mouseup',off);
});

function roamMove(dt){
  let f=0,s=0,u=0;
  if(keys['KeyW']||keys['ArrowUp'])f+=1;
  if(keys['KeyS']||keys['ArrowDown'])f-=1;
  if(keys['KeyD']||keys['ArrowRight'])s+=1;
  if(keys['KeyA']||keys['ArrowLeft'])s-=1;
  if(keys['Space'])u+=1;
  if(keys['KeyC']||keys['ControlLeft'])u-=1;
  f-=stickState.y;s+=stickState.x;u+=altDir;
  if(!f&&!s&&!u)return;
  const sp=roam.speed*(keys['ShiftLeft']||keys['ShiftRight']?3:1)*dt;
  const fx=-Math.sin(roam.yaw),fz=-Math.cos(roam.yaw);
  const rx=Math.cos(roam.yaw),rz=-Math.sin(roam.yaw);
  roam.pos.x+=(fx*f+rx*s)*sp;
  roam.pos.z+=(fz*f+rz*s)*sp;
  roam.pos.y+=u*sp*0.8 + f*Math.sin(roam.pitch)*sp*0.6; // 朝视线方向略带升降
}

/* ================= 飞行动画 / 引擎接口 ================= */
const ease=t=>t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
function fly(to,dur=2.2){
  exitRoam();
  if(to.ty===undefined)to.ty=ctl.target.y;
  return new Promise(res=>{
    flight={t:0,dur,res,
      from:{tx:ctl.target.x,tz:ctl.target.z,ty:ctl.target.y,d:ctl.dist,th:ctl.theta,ph:ctl.phi},to};
  });
}
/* 取景表:dx/dz=焦点修正(对准真实模型) vd=观赏距离 ty=视线中心高度 ph=迎面俯仰角 */
const FOCUS={
  tower:{vd:118,ty:20,ph:73}, skytree:{vd:188,ty:34,ph:73}, tocho:{vd:92,ty:15,ph:70},
  station:{dx:-9,vd:82,ty:4,ph:66}, palace:{vd:135,ty:4}, shibuya:{vd:72,ty:6,ph:66},
  sensoji:{dx:15,vd:74,ty:4,ph:63}, meiji:{vd:68,ty:4}, rainbow:{vd:155,ty:9},
  odaiba:{vd:92,ty:9}, roppongi:{vd:104,ty:14,ph:70}, ginza:{dx:10,dz:-10,vd:55,ty:3,ph:64},
  akiba:{dx:9,vd:70,ty:5,ph:64}, ueno:{dz:-31,vd:92,ty:2}, dome:{vd:76,ty:4},
  kabuki:{vd:56,ty:5}, kokugi:{vd:86,ty:4}, zojoji:{vd:55,ty:3}, toyosu:{vd:92,ty:3},
  shinagawa:{vd:96,ty:9}, kokkai:{vd:70,ty:5}, budokan:{vd:60,ty:5}, forum:{vd:60,ty:4},
  honganji:{vd:55,ty:4}, kabukiza:{vd:60,ty:4}, midtown:{vd:108,ty:16,ph:70},
  omotesando:{vd:70,ty:3}, ameyoko:{dx:-14,vd:58,ty:3,ph:64}, ryogoku:{vd:70,ty:5},
  sunshine:{vd:110,ty:15,ph:70}, todai:{vd:58,ty:4}, kanda:{vd:52,ty:3},
  uenozoo:{vd:60,ty:3}, hibiyapk:{vd:72,ty:2}, nihonbashi:{vd:50,ty:3},
  rikugien:{vd:82,ty:2}, nakame:{dx:150,dz:80,vd:75,ty:2}, atago:{vd:48,ty:4},
  tsukishima:{vd:55,ty:3}, gyoen:{dx:12,dz:-8,vd:82,ty:2},
  hamarikyu:{vd:70,ty:2}, korakuen:{dx:-6,dz:6,vd:60,ty:2}, yasukuni:{vd:72,ty:6},
  tse:{vd:55,ty:4}, boj:{vd:55,ty:4}, stluke:{vd:86,ty:9}, juntendo:{vd:70,ty:6},
  keio:{vd:60,ty:4}, waseda:{vd:60,ty:5}, yushima:{vd:52,ty:3}, nezu:{vd:55,ty:3},
  hanazono:{vd:48,ty:3}, omoide:{dz:-16,vd:46,ty:2,ph:63}, gado:{vd:46,ty:3},
  kappa:{vd:55,ty:3}, sugamo:{vd:55,ty:3}, togoshi:{vd:55,ty:3},
  hibiyahs:{vd:60,ty:3}, nhk:{dx:-14,vd:76,ty:6}, yoyogigym:{vd:70,ty:4},
};
const zoomToDist=z=>Math.max(38,Math.min(2600,1400*Math.pow(2,(10.8-z)/1.25)));
function shortestAngle(a,b){let d=(b-a)%(Math.PI*2);if(d>Math.PI)d-=Math.PI*2;if(d<-Math.PI)d+=Math.PI*2;return a+d;}
const engine={
  flyTo:L=>{
    const F=FOCUS[L.id]||{};
    const tx=L.x+(F.dx||0), tz=L.z+(F.dz||0);
    const d=F.vd!==undefined?F.vd:zoomToDist(L.z);
    const phDeg=F.ph!==undefined?F.ph:L.pitch;
    return fly({tx,tz,ty:F.ty!==undefined?F.ty:3,d,
      th:shortestAngle(ctl.theta,-L.br*Math.PI/180),
      ph:Math.max(0.12,phDeg*Math.PI/180)},2.2);
  },
  overview:()=>fly({tx:0,tz:120,ty:0,d:1500,th:shortestAngle(ctl.theta,0),ph:0.9},2.0),
  topView:()=>fly({tx:ctl.target.x,tz:ctl.target.z,ty:0,d:ctl.dist,th:shortestAngle(ctl.theta,0),ph:0.12},0.9),
};

/* ================= UI ================= */
let currentId=null,touring=false,tourIdx=0,tourToken=0;
function setMode(t){$('modeText').textContent=t;}
function showCard(L){
  $('cTag').textContent=L.tag;$('cName').textContent=L.name;$('cJp').textContent=L.jp;
  $('cM1').textContent=L.m1[0];$('cM1l').textContent=L.m1[1];
  $('cM2').textContent=L.m2[0];$('cM2l').textContent=L.m2[1];
  $('cDesc').textContent=L.d;
  $('card').classList.add('show');
}
function hideCard(){$('card').classList.remove('show');}
$('cardX').onclick=hideCard;
let chipL=null;
function setChip(L){
  chipL=L;
  if(L){$('chipText').textContent=L.name;$('chip').style.display='flex';}
  else $('chip').style.display='none';
}
$('chip').onclick=()=>{if(chipL)selectLandmark(chipL.id);};
function renderList(filter=''){
  const box=$('list');box.innerHTML='';
  const f=filter.trim().toLowerCase();
  const items=LANDMARKS.filter(L=>!f||L.name.toLowerCase().includes(f)||L.sub.toLowerCase().includes(f)||L.jp.toLowerCase().includes(f));
  if(!items.length){box.innerHTML='<div class="lm-empty">没有匹配的地标</div>';return;}
  items.forEach(L=>{
    const b=document.createElement('button');
    b.className='lm';b.dataset.id=L.id;b.style.setProperty('--c',L.c);
    b.innerHTML=`<span class="ic">${L.ico}</span><span><b>${L.name}</b><small>${L.sub}</small></span>`;
    b.onclick=()=>{selectLandmark(L.id);if(innerWidth<760)togglePanel(false);};
    box.appendChild(b);
  });
  highlight(currentId);
}
function highlight(id){
  currentId=id;
  document.querySelectorAll('.lm').forEach(e=>e.classList.toggle('active',e.dataset.id===id));
}
$('q').addEventListener('input',e=>renderList(e.target.value));
$('q').addEventListener('keydown',e=>{
  if(e.key!=='Enter')return;
  const f=e.target.value.trim().toLowerCase();
  const L=LANDMARKS.find(L2=>!f||L2.name.toLowerCase().includes(f)||L2.sub.toLowerCase().includes(f)||L2.jp.toLowerCase().includes(f));
  if(L){selectLandmark(L.id);if(innerWidth<760)togglePanel(false);}
});
renderList();
function togglePanel(force){
  const p=$('panel');
  const show=force!==undefined?force:p.classList.contains('hidden');
  p.classList.toggle('hidden',!show);
  $('btnPlaces').classList.toggle('on',show);
}
$('btnPlaces').onclick=()=>togglePanel();
if(innerWidth<760)togglePanel(false);

async function selectLandmark(id){
  const L=LANDMARKS.find(x=>x.id===id);
  if(!L)return;
  stopMotion();highlight(id);setChip(L);
  await engine.flyTo(L);
  showCard(L);
}
$('btnAll').onclick=()=>{stopMotion();highlight(null);hideCard();setChip(null);engine.overview();};
$('btnTop').onclick=()=>{stopMotion();engine.topView();};
$('zin').onclick=()=>{if(mode==='roam'){roam.speed=Math.min(120,roam.speed*1.25);}else ctl.dist*=0.72;};
$('zout').onclick=()=>{if(mode==='roam'){roam.speed=Math.max(3,roam.speed*0.8);}else ctl.dist*=1.39;};
$('compass').onclick=()=>{
  if(mode==='roam'){roam.yaw=0;}
  else fly({tx:ctl.target.x,tz:ctl.target.z,ty:ctl.target.y,d:ctl.dist,th:shortestAngle(ctl.theta,0),ph:ctl.phi},0.6);
};
function setOrbitUI(on){orbitOn=on;$('btnOrbit').classList.toggle('on',on);}
$('btnOrbit').onclick=()=>{
  if(touring)stopTour();
  exitRoam();
  if(orbitOn){setOrbitUI(false);}
  else{if(ctl.phi<0.5)ctl.phi=1.0;setOrbitUI(true);}
};
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
async function startTour(){
  exitRoam();
  if(orbitOn)setOrbitUI(false);
  touring=true;const token=++tourToken;
  $('btnTour').classList.add('on');$('btnTour').textContent='⏸ 巡游中';
  while(touring&&token===tourToken){
    const L=LANDMARKS[tourIdx%LANDMARKS.length];tourIdx++;
    highlight(L.id);setChip(L);
    await engine.flyTo(L);
    if(!touring||token!==tourToken)break;
    showCard(L);
    orbitOn=true;orbitSpeed=0.35;
    await sleep(4300);
    orbitOn=false;orbitSpeed=1;
    if(!touring||token!==tourToken)break;
    hideCard();
  }
}
function stopTour(){
  touring=false;tourToken++;
  orbitOn=false;orbitSpeed=1;
  $('btnTour').classList.remove('on');$('btnTour').textContent='▶ 巡游';
}
$('btnTour').onclick=()=>{touring?stopTour():startTour();};
function stopMotion(){
  if(touring)stopTour();
  if(orbitOn)setOrbitUI(false);
}
function userInterrupt(){
  if(touring)stopTour();
  if(orbitOn&&mode==='orbit')setOrbitUI(false);
}

/* 罗盘 / 比例尺 */
function updateCompass(deg){$('needle').style.transform=`rotate(${-deg}deg)`;}
function updateScale(mpp){
  const target=mpp*80;
  const nice=[5,10,20,50,100,200,500,1000,2000,5000,10000,20000,50000];
  let m=nice[0];for(const n of nice){if(n<=target)m=n;}
  $('scaleBar').style.width=(m/mpp)+'px';
  $('scaleTxt').textContent=m>=1000?(m/1000)+' km':m+' m';
}

/* 图钉 */
const pinBox=$('pins');
const pinEls=LANDMARKS.map(L=>{
  const e=document.createElement('div');
  e.className='pin';e.style.setProperty('--c',L.c);e.textContent=L.ico;
  e.addEventListener('click',ev=>{ev.stopPropagation();selectLandmark(L.id);});
  pinBox.appendChild(e);
  return {L,el:e,v:new THREE.Vector3()};
});
function updatePins(){
  pinEls.forEach(p=>{
    p.v.set(p.L.x,6,p.L.z).project(camera);
    const dist=camera.position.distanceTo(new THREE.Vector3(p.L.x,0,p.L.z));
    const vis=p.v.z<1&&dist<2400;
    p.el.style.display=vis?'flex':'none';
    if(vis){
      p.el.style.left=(p.v.x*0.5+0.5)*innerWidth+'px';
      p.el.style.top=(-p.v.y*0.5+0.5)*innerHeight+'px';
      const s=Math.max(0.5,Math.min(1,420/dist+0.42));
      p.el.style.transform=`translate(-50%,-50%) scale(${s})`;
    }
  });
}

/* ================= 主循环 ================= */
const clock=new THREE.Clock();let trainT=0;
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05);
  updateTrains(dt);
  updateCars(dt);
  updateBuses(dt);
  updateLOD(dt);
  if(isRain){
    const pos=rainGeo.attributes.position;
    rainPts.position.set(camera.position.x,0,camera.position.z);
    for(let i=0;i<RAIN_N;i++){
      let y=pos.getY(i)-dt*(75+(i%5)*8);
      if(y<0)y=SNOW_H;
      pos.setY(i,y);
      pos.setX(i,pos.getX(i)-dt*7);
    }
    pos.needsUpdate=true;
  }
  if(isSnow){
    const pos=snowGeo.attributes.position;
    const cxp=camera.position.x,czp=camera.position.z;
    snowPts.position.set(cxp,0,czp);
    for(let i=0;i<SNOW_N;i++){
      let y=pos.getY(i)-dt*(14+(i%7));
      if(y<0)y=SNOW_H;
      pos.setY(i,y);
      pos.setX(i,pos.getX(i)+Math.sin((y+i)*0.13)*dt*3);
    }
    pos.needsUpdate=true;
  }
  if(ferris)ferris.rotation.z+=dt*0.12;
  if(isNight){
    const tt=performance.now()*0.004;
    flickers.forEach((m,i)=>{m.opacity=0.72+0.28*Math.abs(Math.sin(tt+i*1.7));m.transparent=true;});
  }
  waterBump.offset.x+=dt*0.018;waterBump.offset.y+=dt*0.011;
  if(clouds.visible)clouds.children.forEach(s=>{
    s.position.x+=s.userData.v*dt;
    if(s.position.x>3800)s.position.x=-3800;
  });

  if(mode==='roam'){
    roamMove(dt);
    syncRoamCam();
    updateCompass(-roam.yaw*180/Math.PI);
    updateScale(Math.max(2,roam.pos.y)*10*Math.tan(camera.fov/2*Math.PI/180)*2/innerHeight);
  }else{
    if(flight){
      flight.t+=dt/flight.dur;
      const k=ease(Math.min(1,flight.t)),f=flight.from,to=flight.to;
      ctl.target.x=f.tx+(to.tx-f.tx)*k;
      ctl.target.z=f.tz+(to.tz-f.tz)*k;
      ctl.target.y=f.ty+(to.ty-f.ty)*k;
      ctl.dist=f.d+(to.d-f.d)*k;
      ctl.theta=f.th+(to.th-f.th)*k;
      ctl.phi=f.ph+(to.ph-f.ph)*k;
      if(flight.t>=1){const r=flight.res;flight=null;r&&r();}
    }
    if(orbitOn&&!flight)ctl.theta+=dt*0.12*orbitSpeed;
    syncOrbitCam();
    if(scene.fog){
      const base=isNight?3800:4600;
      scene.fog.far=Math.min(13000,Math.max(base,ctl.dist*3.4));
      scene.fog.near=Math.max(isNight?650:850,ctl.dist*1.05);
    }
    updateCompass(-ctl.theta*180/Math.PI);
    updateScale(ctl.dist*10*Math.tan(camera.fov/2*Math.PI/180)*2/innerHeight);
  }
  skyDome.position.copy(camera.position); // 天空跟随相机,任何位置都全景包裹
  updatePins();
  renderer.render(scene,camera);
}
syncOrbitCam();
animate();
setTimeout(()=>{$('boot').style.opacity=0;setTimeout(()=>$('boot').remove(),550);},300);

addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
