<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Astra Rift</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="game-shell" aria-label="Astra Rift arcade game">
      <canvas id="gameCanvas" aria-label="Astra Rift game field"></canvas>

      <header class="hud" aria-label="Game status">
        <div class="hud-title">
          <span class="brand-mark" aria-hidden="true"></span>
          <span>Astra Rift</span>
        </div>
        <div class="hud-stat">
          <span>Wave</span>
          <strong id="waveText">1/6</strong>
        </div>
        <div class="hud-stat">
          <span>Score</span>
          <strong id="scoreText">0</strong>
        </div>
        <div class="hud-stat">
          <span>Revive</span>
          <strong id="reviveText">1</strong>
        </div>
        <div class="hud-meter" aria-label="Hull">
          <span>Hull</span>
          <div class="meter-track">
            <i id="healthFill"></i>
          </div>
        </div>
        <div class="hud-meter" aria-label="Flux">
          <span>Flux</span>
          <div class="meter-track flux">
            <i id="energyFill"></i>
          </div>
        </div>
        <button id="pauseBtn" class="icon-button" type="button" aria-label="Pause game">||</button>
      </header>

      <div id="bossBar" class="boss-bar is-hidden" aria-label="Boss health">
        <span id="bossName">Rift Sovereign</span>
        <div class="boss-track">
          <i id="bossFill"></i>
        </div>
      </div>

      <div id="waveBanner" class="wave-banner" aria-live="polite"></div>

      <section id="panel" class="overlay" aria-live="polite">
        <div class="panel">
          <p class="kicker">Arcade survival</p>
          <h1>Astra Rift</h1>
          <p id="panelMessage">
            Cut through five enemy waves, use one revive wisely, and defeat the Rift Sovereign.
          </p>
          <div id="panelSummary" class="panel-summary is-hidden"></div>
          <button id="startBtn" class="primary-button" type="button">Start Run</button>
        </div>
      </section>

      <nav id="touchControls" class="touch-controls" aria-label="Touch controls">
        <div id="stick" class="stick" aria-hidden="true">
          <i id="stickKnob"></i>
        </div>
        <div class="touch-actions">
          <button id="pulseTouch" class="touch-button" type="button" aria-label="Pulse">P</button>
          <button id="dashTouch" class="touch-button" type="button" aria-label="Dash">D</button>
        </div>
      </nav>
    </main>

    <script src="game.js"></script>
  </body>
</html>
