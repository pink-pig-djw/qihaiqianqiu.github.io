<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>数据残像 · DATA AFTERIMAGE</title>
<style>
/* ============ 设计令牌 ============ */
:root{
  --mono:'Cascadia Code','SF Mono','JetBrains Mono','Fira Code',Menlo,Consolas,'DejaVu Sans Mono','Noto Sans Mono','PingFang SC','Hiragino Sans GB','Microsoft YaHei','Source Han Sans SC','Noto Sans CJK SC',monospace;
  --bg:#04070a;
  --screen-bg:#06120b;
  --phosphor:#36f0a0;        /* 翠绿磷光主色 */
  --phosphor-dim:#1f7a52;
  --phosphor-bright:#c8ffe6;
  --amber:#ffc24d;
  --danger:#ff4242;
  --danger-bright:#ff8a8a;
  --danger-dim:#7a1f1f;
  --ocean:#46b6ff;
  --ocean-deep:#0a2740;
  --mosaic:#ff3df0;
  --glow:0 0 1px currentColor,0 0 6px rgba(54,240,160,.55);
  --scan-op:.20;
  --flick-op:1;
}
/* 主题：红色危机 */
.theme-red{
  --screen-bg:#160707;
  --phosphor:#ff4646;
  --phosphor-dim:#8a2323;
  --phosphor-bright:#ffd0d0;
  --glow:0 0 1px currentColor,0 0 7px rgba(255,70,70,.6);
}
/* 主题：光之海（结局C） */
.theme-blue{
  --screen-bg:#04111f;
  --phosphor:#5ec4ff;
  --phosphor-dim:#2a6a9a;
  --phosphor-bright:#dff3ff;
  --glow:0 0 1px currentColor,0 0 8px rgba(94,196,255,.5);
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  background:var(--bg);
  font-family:var(--mono);
  color:var(--phosphor);
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  letter-spacing:.3px;
}
.hidden{display:none !important}
b{font-weight:700;color:var(--phosphor-bright)}

/* ============ 通电开机屏 ============ */
.power{
  position:fixed;inset:0;z-index:50;
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at center,#0a1410 0%,#04070a 70%);
}
.power-inner{text-align:center;animation:powerIn .8s ease}
@keyframes powerIn{from{opacity:0;transform:translateY(8px)}to{opacity:1}}
.logo{
  font-size:clamp(28px,7vw,64px);font-weight:800;letter-spacing:8px;
  color:var(--phosphor);text-shadow:var(--glow);
}
.logo-sub{margin-top:10px;color:var(--phosphor-dim);letter-spacing:5px;font-size:clamp(11px,2.4vw,15px)}
.power-btn{
  margin-top:42px;padding:16px 38px;font-family:var(--mono);font-size:17px;letter-spacing:3px;
  background:transparent;color:var(--phosphor);border:1px solid var(--phosphor-dim);
  cursor:pointer;text-shadow:var(--glow);transition:.25s;border-radius:2px;
}
.power-btn:hover,.power-btn:focus-visible{background:rgba(54,240,160,.10);border-color:var(--phosphor);box-shadow:0 0 18px rgba(54,240,160,.25);outline:none}
.power-note{margin-top:26px;color:var(--phosphor-dim);font-size:12px;letter-spacing:2px;opacity:.8}

/* ============ CRT 外壳与屏幕 ============ */
.crt{position:fixed;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;padding:min(3vmin,26px)}
.bezel{
  position:relative;width:100%;max-width:1080px;height:100%;max-height:760px;
  background:linear-gradient(#0c1512,#070d0a);
  border-radius:18px;
  padding:clamp(10px,2.2vmin,22px);
  box-shadow:0 0 0 2px #0a120e,0 22px 60px rgba(0,0,0,.7),inset 0 0 30px rgba(0,0,0,.6);
}
.screen{
  position:relative;width:100%;height:100%;overflow:hidden;
  background:radial-gradient(ellipse at center,color-mix(in srgb,var(--screen-bg) 88%,#0c2018) 0%,var(--screen-bg) 80%);
  border-radius:10px;
  display:flex;flex-direction:column;
  box-shadow:inset 0 0 70px rgba(0,0,0,.85),inset 0 0 8px color-mix(in srgb,var(--phosphor) 20%,transparent);
  transition:background .9s ease,box-shadow .9s ease;
}
/* 叠加层 */
.overlay{position:absolute;inset:0;pointer-events:none;border-radius:10px;z-index:5}
.scanlines{
  background:repeating-linear-gradient(to bottom,rgba(0,0,0,0) 0px,rgba(0,0,0,0) 2px,rgba(0,0,0,var(--scan-op)) 3px,rgba(0,0,0,var(--scan-op)) 4px);
  mix-blend-mode:multiply;
}
.vignette{box-shadow:inset 0 0 120px 30px rgba(0,0,0,.55);background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,.35) 100%)}
.flicker{background:color-mix(in srgb,var(--phosphor) 4%,transparent);opacity:0;animation:flick 7s steps(60) infinite}
@keyframes flick{0%,96%,100%{opacity:0}97%{opacity:.10}98%{opacity:0}99%{opacity:.06}}
.glitch{z-index:8;opacity:0;mix-blend-mode:screen}
.glitch.on{animation:glitchFlash .55s steps(8)}
@keyframes glitchFlash{
  0%{opacity:0}
  10%{opacity:.9;background:linear-gradient(transparent 40%,rgba(255,61,240,.18) 42%,transparent 44%),linear-gradient(transparent 70%,rgba(70,182,255,.18) 72%,transparent 74%);transform:translateX(-3px)}
  30%{opacity:.7;background:rgba(255,66,66,.12);transform:translateX(4px) skewX(-1deg)}
  55%{opacity:.85;background:repeating-linear-gradient(to bottom,rgba(255,255,255,.06) 0 1px,transparent 1px 5px);transform:translateX(-2px)}
  100%{opacity:0;transform:none}
}

/* ============ 状态栏 ============ */
.statusbar{
  flex:0 0 auto;display:flex;justify-content:space-between;align-items:center;gap:10px;
  padding:8px 14px;font-size:12px;letter-spacing:1px;
  border-bottom:1px solid color-mix(in srgb,var(--phosphor) 25%,transparent);
  color:var(--phosphor-dim);text-shadow:var(--glow);
  background:color-mix(in srgb,var(--phosphor) 5%,transparent);
  z-index:6;flex-wrap:wrap;
}
.statusbar b{color:var(--phosphor)}
.sb-mid{color:var(--danger);letter-spacing:2px;animation:blink 1.1s steps(2) infinite;font-weight:700}
.sb-mid:empty{display:none}
@keyframes blink{50%{opacity:.25}}
.sb-timer{margin-left:14px;color:var(--danger);font-weight:800;font-size:14px;letter-spacing:1px}
.sb-timer.warn{animation:blink .5s steps(2) infinite}

/* ============ 桌面 / 日志 ============ */
.desktop{flex:1 1 auto;position:relative;overflow:hidden;z-index:6}
.log{
  position:absolute;inset:0;overflow-y:auto;padding:20px clamp(16px,3.5vw,40px) 26px;
  scroll-behavior:smooth;
}
.log::-webkit-scrollbar{width:8px}
.log::-webkit-scrollbar-thumb{background:color-mix(in srgb,var(--phosphor) 30%,transparent);border-radius:8px}
.log::-webkit-scrollbar-track{background:transparent}

.line{margin:0 0 9px;line-height:1.65;font-size:clamp(13px,2.5vw,15.5px);white-space:pre-wrap;word-break:break-word;text-shadow:var(--glow);animation:lineIn .25s ease}
@keyframes lineIn{from{opacity:0}to{opacity:1}}
.sys{color:var(--phosphor)}
.sys::before{content:"";color:var(--phosphor-dim)}
.dim{color:var(--phosphor-dim);font-size:12.5px}
.warnline{color:var(--amber);text-shadow:0 0 6px rgba(255,194,77,.4)}
.dangerline{color:var(--danger);text-shadow:0 0 7px rgba(255,66,66,.45);font-weight:600}
.corrupt{color:var(--mosaic);text-shadow:0 0 8px rgba(255,61,240,.5);letter-spacing:1px}
.muted-data{color:var(--phosphor-dim);opacity:.55}

/* 对话块 */
.speak{margin:14px 0;padding:12px 16px;border-left:2px solid var(--phosphor-dim);background:color-mix(in srgb,var(--phosphor) 5%,transparent);animation:lineIn .3s ease}
.speak.beta{border-color:var(--danger)}
.speak.child{border-color:var(--ocean)}
.speak.lian{border-color:var(--amber)}
.speak .who{font-size:11px;letter-spacing:3px;color:var(--phosphor-dim);text-transform:uppercase;margin-bottom:6px}
.speak.beta .who{color:var(--danger)}
.speak.child .who{color:var(--ocean)}
.speak.lian .who{color:var(--amber)}
.speak .txt{line-height:1.68;font-size:clamp(13.5px,2.6vw,16px);text-shadow:var(--glow)}
.speak.child .txt{color:var(--ocean);text-shadow:0 0 7px rgba(70,182,255,.4)}

/* 邮件卡片 */
.mail{margin:16px 0;border:1px solid var(--phosphor-dim);border-radius:4px;overflow:hidden;animation:lineIn .35s ease}
.mail-hd{display:flex;justify-content:space-between;gap:8px;padding:9px 14px;background:color-mix(in srgb,var(--amber) 14%,transparent);border-bottom:1px solid var(--phosphor-dim);font-size:12px;color:var(--amber);letter-spacing:1px;flex-wrap:wrap}
.mail-tag{background:var(--amber);color:#1a1200;padding:1px 7px;border-radius:2px;font-weight:800;font-size:10px;letter-spacing:1px}
.mail-bd{padding:14px 16px;line-height:1.7;font-size:14px}

/* 光标 */
.cursor{display:inline-block;width:9px;height:1.05em;background:var(--phosphor);vertical-align:text-bottom;margin-left:2px;box-shadow:var(--glow);animation:curBlink 1s steps(2) infinite}
@keyframes curBlink{50%{opacity:0}}

/* ============ 选项按钮 ============ */
.choices{margin:20px 0 8px;display:flex;flex-direction:column;gap:10px;animation:lineIn .4s ease}
.choice{
  text-align:left;font-family:var(--mono);font-size:clamp(13px,2.5vw,15px);
  padding:13px 16px;background:transparent;color:var(--phosphor);
  border:1px solid var(--phosphor-dim);border-radius:3px;cursor:pointer;
  transition:.18s;line-height:1.5;text-shadow:var(--glow);position:relative;
}
.choice:hover,.choice:focus-visible{background:color-mix(in srgb,var(--phosphor) 12%,transparent);border-color:var(--phosphor);transform:translateX(4px);outline:none}
.choice .ck{color:var(--phosphor-dim);margin-right:8px}
.choice.danger{border-color:var(--danger-dim);color:var(--danger-bright)}
.choice.danger:hover{background:rgba(255,66,66,.12);border-color:var(--danger)}
.choice.locked{opacity:.45;cursor:not-allowed;border-style:dashed}
.choice.locked:hover{transform:none;background:transparent;border-color:var(--phosphor-dim)}
.choice .tagcost{float:right;font-size:11px;color:var(--phosphor-dim);letter-spacing:1px}

/* 继续提示 */
.conthint{margin:8px 0 4px;color:var(--phosphor-dim);font-size:12px;letter-spacing:2px;cursor:pointer;animation:blink 1.4s steps(2) infinite;user-select:none}
.conthint:hover{color:var(--phosphor)}

/* ============ 任务栏 ============ */
.taskbar{
  flex:0 0 auto;display:flex;align-items:center;gap:8px;padding:7px 12px;
  border-top:1px solid color-mix(in srgb,var(--phosphor) 22%,transparent);
  background:color-mix(in srgb,var(--phosphor) 5%,transparent);
  font-size:11px;color:var(--phosphor-dim);letter-spacing:1px;z-index:6;flex-wrap:wrap;min-height:32px;
}
.tb-chip{padding:3px 9px;border:1px solid color-mix(in srgb,var(--phosphor) 22%,transparent);border-radius:2px}
.tb-spacer{flex:1}

/* ============ 静音按钮 ============ */
.mute{position:fixed;top:14px;right:16px;z-index:60;width:38px;height:38px;border-radius:50%;
  background:rgba(6,18,11,.8);border:1px solid var(--phosphor-dim);color:var(--phosphor);
  font-size:16px;cursor:pointer;transition:.2s;text-shadow:var(--glow)}
.mute:hover,.mute:focus-visible{border-color:var(--phosphor);box-shadow:0 0 12px rgba(54,240,160,.3);outline:none}
.mute.off{color:var(--phosphor-dim);border-color:#333}

/* ============ 小游戏面板通用 ============ */
.panel{position:absolute;inset:0;overflow-y:auto;padding:18px clamp(14px,3vw,32px);z-index:7;background:var(--screen-bg);animation:lineIn .3s ease}
.panel::-webkit-scrollbar{width:8px}
.panel::-webkit-scrollbar-thumb{background:color-mix(in srgb,var(--phosphor) 30%,transparent);border-radius:8px}
.p-title{font-size:13px;letter-spacing:3px;color:var(--phosphor-dim);border-bottom:1px solid var(--phosphor-dim);padding-bottom:8px;margin-bottom:14px;text-transform:uppercase}
.p-desc{font-size:13px;line-height:1.6;color:var(--phosphor);margin-bottom:16px;text-shadow:var(--glow)}
.p-desc .hl{color:var(--amber)}

/* 文件管理器 */
.fm{display:flex;flex-direction:column;gap:8px}
.fm-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid color-mix(in srgb,var(--phosphor) 20%,transparent);border-radius:3px;cursor:pointer;transition:.15s;font-size:13.5px;text-shadow:var(--glow)}
.fm-item:hover{background:color-mix(in srgb,var(--phosphor) 10%,transparent);border-color:var(--phosphor);transform:translateX(3px)}
.fm-item .ico{color:var(--phosphor-dim)}
.fm-item .sz{margin-left:auto;color:var(--phosphor-dim);font-size:11px}
.fm-item.opened{opacity:.5}
.fm-item.opened .sz::after{content:" ✓ 已读"}

/* 逻辑网格 */
.grid-wrap{display:grid;grid-template-columns:1fr 1fr;gap:22px}
@media(max-width:560px){.grid-wrap{grid-template-columns:1fr}}
.grid-col h4{font-size:11px;letter-spacing:2px;color:var(--phosphor-dim);margin-bottom:10px;text-transform:uppercase}
.gcard{padding:11px 13px;margin-bottom:9px;border:1px solid color-mix(in srgb,var(--phosphor) 25%,transparent);border-radius:3px;cursor:pointer;font-size:13px;line-height:1.5;transition:.15s;text-shadow:var(--glow);position:relative}
.gcard:hover{border-color:var(--phosphor);background:color-mix(in srgb,var(--phosphor) 8%,transparent)}
.gcard.sel{border-color:var(--amber);background:color-mix(in srgb,var(--amber) 12%,transparent);color:var(--amber)}
.gcard.done{border-color:var(--phosphor);background:color-mix(in srgb,var(--phosphor) 14%,transparent);cursor:default;opacity:.8}
.gcard.done::after{content:"✓";position:absolute;right:10px;top:9px;color:var(--phosphor)}
.gcard.bad{animation:shake .35s}
@keyframes shake{0%,100%{transform:none}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.gcard .gc-corrupt{color:var(--mosaic)}

/* 音频解码器 */
.dec-wave{width:100%;height:140px;border:1px solid var(--phosphor-dim);border-radius:4px;background:#030a07;display:block;margin-bottom:14px}
.dec-row{display:flex;align-items:center;gap:14px;margin-bottom:14px;flex-wrap:wrap}
.dec-row label{font-size:12px;color:var(--phosphor-dim);letter-spacing:1px;min-width:84px}
.slider{-webkit-appearance:none;appearance:none;flex:1;min-width:160px;height:4px;background:var(--phosphor-dim);border-radius:3px;outline:none}
.slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--phosphor);cursor:pointer;box-shadow:0 0 8px rgba(54,240,160,.6)}
.slider::-moz-range-thumb{width:18px;height:18px;border:none;border-radius:50%;background:var(--phosphor);cursor:pointer}
.dec-lock{height:8px;background:#030a07;border:1px solid var(--phosphor-dim);border-radius:5px;overflow:hidden;margin:6px 0 16px}
.dec-lock i{display:block;height:100%;width:0;background:var(--phosphor);box-shadow:0 0 8px var(--phosphor);transition:width .1s linear}
.dec-readout{font-size:12px;color:var(--phosphor-dim);letter-spacing:1px;margin-bottom:10px}

/* 控制台 */
.term{background:#020705;border:1px solid var(--phosphor-dim);border-radius:4px;padding:14px;font-size:13px;line-height:1.6;min-height:200px;max-height:42vh;overflow-y:auto;margin-bottom:14px}
.term::-webkit-scrollbar{width:6px}.term::-webkit-scrollbar-thumb{background:var(--phosphor-dim)}
.term .t-out{color:var(--phosphor);text-shadow:var(--glow);white-space:pre-wrap;margin-bottom:3px}
.term .t-cmd{color:var(--amber)}.term .t-cmd::before{content:"❯ ";color:var(--phosphor-dim)}
.term .t-err{color:var(--danger)}
.term .t-ok{color:var(--phosphor-bright)}
.cmd-chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{font-family:var(--mono);font-size:12.5px;padding:8px 13px;border:1px solid var(--phosphor-dim);border-radius:3px;background:transparent;color:var(--phosphor);cursor:pointer;transition:.15s;text-shadow:var(--glow)}
.chip:hover,.chip:focus-visible{border-color:var(--phosphor);background:color-mix(in srgb,var(--phosphor) 10%,transparent);outline:none}
.chip.danger{color:var(--danger-bright);border-color:var(--danger-dim)}
.chip.danger:hover{background:rgba(255,66,66,.1);border-color:var(--danger)}

/* 无脸照片 */
.photo{margin:18px auto;max-width:330px;border:2px solid var(--phosphor-dim);background:#020705;padding:14px;text-align:center;animation:lineIn .5s ease}
.photo-canvas{width:100%;image-rendering:pixelated;border:1px solid var(--phosphor-dim)}
.photo-cap{margin-top:10px;font-size:11px;color:var(--phosphor-dim);letter-spacing:1px;line-height:1.5}

/* 内存块表 */
.memtable{width:100%;border-collapse:collapse;margin:14px 0;font-size:12px}
.memtable th,.memtable td{border:1px solid color-mix(in srgb,var(--phosphor) 22%,transparent);padding:8px 10px;text-align:left;line-height:1.5}
.memtable th{color:var(--phosphor-dim);letter-spacing:1px;font-weight:700;background:color-mix(in srgb,var(--phosphor) 6%,transparent)}
.memtable td{text-shadow:var(--glow)}
.memtable .pol-neg{color:var(--danger)}
.memtable .pol-num{color:var(--phosphor-dim)}

/* 倒计时大屏 */
.bigtimer{position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:9;font-size:clamp(22px,6vw,40px);font-weight:800;color:var(--danger);text-shadow:0 0 14px rgba(255,66,66,.6);letter-spacing:2px;pointer-events:none}

/* 结局海 */
.sea{position:absolute;inset:0;background:linear-gradient(180deg,#04111f 0%,#072036 45%,#0a2b48 100%);display:flex;align-items:center;justify-content:center;z-index:8;overflow:hidden}
.sea pre{color:var(--ocean);font-size:clamp(7px,1.6vw,12px);line-height:1.15;text-shadow:0 0 8px rgba(70,182,255,.4);opacity:.9}
.sea-cur{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);width:10px;height:18px;background:var(--ocean);box-shadow:0 0 12px var(--ocean);animation:curBlink 1.2s steps(2) infinite}

/* 屏幕震动 */
.shake-screen{animation:scshake .4s linear}
@keyframes scshake{0%,100%{transform:none}10%{transform:translate(-3px,2px)}30%{transform:translate(4px,-3px)}50%{transform:translate(-4px,1px)}70%{transform:translate(3px,3px)}90%{transform:translate(-2px,-2px)}}

/* 标题大字 */
.chapter-card{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;gap:14px;animation:lineIn .6s ease}
.chapter-no{font-size:12px;letter-spacing:6px;color:var(--phosphor-dim)}
.chapter-title{font-size:clamp(24px,6vw,46px);font-weight:800;letter-spacing:4px;text-shadow:var(--glow)}
.chapter-en{font-size:12px;letter-spacing:4px;color:var(--phosphor-dim)}

/* 无障碍 / 动效偏好 */
@media (prefers-reduced-motion: reduce){
  .flicker,.glitch.on{animation:none !important}
  *{scroll-behavior:auto !important}
  .sb-mid,.sb-timer.warn,.cursor,.conthint,.sea-cur{animation:none !important}
}
@media (max-width:600px){
  .bezel{border-radius:12px;padding:8px}
  .statusbar{font-size:10.5px;padding:6px 9px}
}
</style>
</head>
<body>

<div id="power" class="power">
  <div class="power-inner">
    <div class="logo">CORE-MATRIX</div>
    <div class="logo-sub">意 识 托 管 · 操 作 员 终 端</div>
    <button id="power-btn" class="power-btn" aria-label="通电开机">&#9679; 通电开机</button>
    <div class="power-note">建议佩戴耳机 · 本作含程序化生成的音乐与音效</div>
  </div>
</div>

<button id="mute" class="mute" aria-label="切换静音">&#9834;</button>

<div id="crt" class="crt theme-green hidden">
  <div class="bezel">
    <div class="screen" id="screen">
      <header class="statusbar" id="statusbar">
        <span class="sb-left">CORE-MATRIX&nbsp;OS&nbsp;·&nbsp;操作员&nbsp;<b>#9527</b></span>
        <span class="sb-mid" id="sb-monitor"></span>
        <span class="sb-right">合规积分&nbsp;<b id="sb-score">100</b><span id="sb-timer" class="sb-timer hidden"></span></span>
      </header>
      <main class="desktop" id="desktop">
        <div class="log" id="log"></div>
      </main>
      <footer class="taskbar" id="taskbar">
        <span class="tb-chip" id="tb-ch">序章</span>
        <span class="tb-chip" id="tb-date">2085-09-27</span>
        <span class="tb-spacer"></span>
        <span class="tb-chip">NEURAL-LINK 已连接</span>
      </footer>
    </div>
    <div class="overlay scanlines"></div>
    <div class="overlay vignette"></div>
    <div class="overlay flicker"></div>
    <div class="overlay glitch" id="glitch"></div>
  </div>
</div>

<script>
/* =========================================================
   音频引擎 — 全程序化合成（Web Audio API），无外部音频文件
   背景氛围乐 + 机械键盘 + 电子哀鸣 + 小女孩笑声 + 警报 + 解锁音
   ========================================================= */
const Audio = {
  ctx:null, master:null, musicBus:null, sfxBus:null, reverb:null,
  muted:false, layers:[], theme:null, _klaxon:null, _tickTimer:null,

  init(){
    if(this.ctx) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    this.ctx = new AC();
    this.master = this.ctx.createGain(); this.master.gain.value = 0.0;
    this.master.connect(this.ctx.destination);
    // 上电淡入
    this.master.gain.linearRampToValueAtTime(0.85, this.ctx.currentTime + 1.2);
    this.musicBus = this.ctx.createGain(); this.musicBus.gain.value = 0.55; this.musicBus.connect(this.master);
    this.sfxBus = this.ctx.createGain(); this.sfxBus.gain.value = 0.9; this.sfxBus.connect(this.master);
    this.reverb = this._makeReverb(2.6, 2.4);
    const rg = this.ctx.createGain(); rg.gain.value = 0.5; this.reverb.connect(rg); rg.connect(this.master);
    this.reverbIn = this.reverb;
  },
  now(){ return this.ctx ? this.ctx.currentTime : 0; },
  resume(){ if(this.ctx && this.ctx.state==='suspended') this.ctx.resume(); },

  _makeReverb(seconds, decay){
    const ctx=this.ctx, rate=ctx.sampleRate, len=rate*seconds;
    const buf=ctx.createBuffer(2,len,rate);
    for(let c=0;c<2;c++){ const d=buf.getChannelData(c);
      for(let i=0;i<len;i++){ d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay); } }
    const conv=ctx.createConvolver(); conv.buffer=buf; return conv;
  },
  _noiseBuffer(seconds){
    const ctx=this.ctx, len=ctx.sampleRate*seconds, buf=ctx.createBuffer(1,len,ctx.sampleRate), d=buf.getChannelData(0);
    for(let i=0;i<len;i++) d[i]=Math.random()*2-1; return buf;
  },

  toggleMute(){
    this.muted=!this.muted;
    if(this.master) this.master.gain.setTargetAtTime(this.muted?0:0.85, this.now(), 0.08);
    return this.muted;
  },

  /* ---------------- 音效 ---------------- */
  key(){ // 机械键盘单击
    if(!this.ctx||this.muted) return;
    const t=this.now(), src=this.ctx.createBufferSource(); src.buffer=this._noiseBuffer(0.04);
    const bp=this.ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1400+Math.random()*900; bp.Q.value=1.2;
    const g=this.ctx.createGain(); g.gain.setValueAtTime(0.0,t); g.gain.linearRampToValueAtTime(0.10+Math.random()*0.05,t+0.002); g.gain.exponentialRampToValueAtTime(0.0008,t+0.05);
    src.connect(bp); bp.connect(g); g.connect(this.sfxBus); src.start(t); src.stop(t+0.06);
    // 低频"哒"
    const o=this.ctx.createOscillator(); o.type='triangle'; o.frequency.setValueAtTime(180,t); o.frequency.exponentialRampToValueAtTime(70,t+0.04);
    const g2=this.ctx.createGain(); g2.gain.setValueAtTime(0.06,t); g2.gain.exponentialRampToValueAtTime(0.001,t+0.045);
    o.connect(g2); g2.connect(this.sfxBus); o.start(t); o.stop(t+0.05);
  },
  beep(freq=880,dur=0.09,type='square',vol=0.14){
    if(!this.ctx||this.muted) return;
    const t=this.now(), o=this.ctx.createOscillator(), g=this.ctx.createGain();
    o.type=type; o.frequency.value=freq;
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(vol,t+0.006); g.gain.setValueAtTime(vol,t+dur*0.6); g.gain.exponentialRampToValueAtTime(0.0008,t+dur);
    o.connect(g); g.connect(this.sfxBus); o.start(t); o.stop(t+dur+0.02);
  },
  bootBeeps(){
    if(!this.ctx) return;
    [ [523,0.07],[0,0.06],[392,0.07],[0,0.05],[659,0.10] ].reduce((tOff,[f,d])=>{
      if(f) setTimeout(()=>this.beep(f,d,'square',0.10), tOff*1000);
      return tOff+d;
    },0.1);
  },
  error(){ // 报错蜂鸣
    if(!this.ctx||this.muted) return;
    const t=this.now();
    for(let i=0;i<2;i++){ const o=this.ctx.createOscillator(),g=this.ctx.createGain();
      o.type='sawtooth'; o.frequency.value=i?150:120;
      const s=t+i*0.13; g.gain.setValueAtTime(0,s); g.gain.linearRampToValueAtTime(0.16,s+0.01); g.gain.exponentialRampToValueAtTime(0.001,s+0.11);
      o.connect(g); g.connect(this.sfxBus); o.start(s); o.stop(s+0.12); }
  },
  glitch(){ // 数据撕裂 / 0xDEADBEEF
    if(!this.ctx||this.muted) return;
    const t=this.now(), src=this.ctx.createBufferSource(); src.buffer=this._noiseBuffer(0.5);
    const bp=this.ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.setValueAtTime(400,t); bp.frequency.exponentialRampToValueAtTime(5000,t+0.18); bp.frequency.exponentialRampToValueAtTime(300,t+0.45); bp.Q.value=6;
    const g=this.ctx.createGain(); g.gain.setValueAtTime(0,t);
    // 颤动门限，制造比特碎裂感
    for(let i=0;i<14;i++){ const tt=t+i*0.032; g.gain.setValueAtTime(Math.random()*0.22, tt); }
    g.gain.exponentialRampToValueAtTime(0.001,t+0.5);
    src.connect(bp); bp.connect(g); g.connect(this.sfxBus); g.connect(this.reverbIn); src.start(t); src.stop(t+0.5);
    // 下滑方波
    const o=this.ctx.createOscillator(),og=this.ctx.createGain(); o.type='square';
    o.frequency.setValueAtTime(900,t); o.frequency.exponentialRampToValueAtTime(60,t+0.4);
    og.gain.setValueAtTime(0.10,t); og.gain.exponentialRampToValueAtTime(0.001,t+0.42);
    o.connect(og); og.connect(this.sfxBus); o.start(t); o.stop(t+0.45);
  },
  formatWail(){ // 格式化：凄厉的电子哀鸣
    if(!this.ctx||this.muted) return;
    const t=this.now();
    const o=this.ctx.createOscillator(),o2=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type='sawtooth'; o2.type='sawtooth'; o2.detune.value=14;
    o.frequency.setValueAtTime(880,t); o.frequency.exponentialRampToValueAtTime(1760,t+0.18); o.frequency.exponentialRampToValueAtTime(45,t+1.5);
    o2.frequency.setValueAtTime(884,t); o2.frequency.exponentialRampToValueAtTime(1770,t+0.18); o2.frequency.exponentialRampToValueAtTime(44,t+1.5);
    const lp=this.ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.setValueAtTime(4000,t); lp.frequency.exponentialRampToValueAtTime(200,t+1.5); lp.Q.value=8;
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.20,t+0.05); g.gain.setValueAtTime(0.20,t+0.6); g.gain.exponentialRampToValueAtTime(0.001,t+1.6);
    o.connect(lp); o2.connect(lp); lp.connect(g); g.connect(this.sfxBus); g.connect(this.reverbIn);
    o.start(t); o2.start(t); o.stop(t+1.65); o2.stop(t+1.65);
    // 末尾归零的"咔"
    setTimeout(()=>this.beep(2200,0.05,'square',0.10),1550);
  },
  laugh(eerie=false){ // 小女孩的笑声（程序化、克制的"哈哈哈"，刻意带不真实感）
    if(!this.ctx||this.muted) return;
    const t0=this.now();
    const syl=[0,0.155,0.30,0.45,0.61];
    const pitch=eerie?[300,360,330,300,260]:[540,660,610,720,560];
    syl.forEach((dt,i)=>{
      const t=t0+dt;
      const o=this.ctx.createOscillator(); o.type='sine';
      const f=pitch[i]*(eerie?(0.7+Math.random()*0.3):1);
      o.frequency.setValueAtTime(f*0.88,t); o.frequency.exponentialRampToValueAtTime(f,t+0.04); o.frequency.exponentialRampToValueAtTime(f*0.8,t+0.12);
      if(eerie) o.detune.setValueAtTime(-30+Math.random()*60,t);
      const o3=this.ctx.createOscillator(); o3.type='sine'; o3.frequency.value=f*2.0; // 上方泛音，像声带
      const bp=this.ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=eerie?900:1500; bp.Q.value=4;
      const g=this.ctx.createGain(); g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.16,t+0.02); g.gain.exponentialRampToValueAtTime(0.0008,t+0.135);
      const gh=this.ctx.createGain(); gh.gain.value=0.04;
      o.connect(bp); o3.connect(gh); gh.connect(bp); bp.connect(g); g.connect(this.sfxBus); g.connect(this.reverbIn);
      o.start(t); o3.start(t); o.stop(t+0.15); o3.stop(t+0.15);
    });
  },
  unlock(){ // 解锁/成功的上行琶音
    if(!this.ctx||this.muted) return;
    [523,659,784,1047].forEach((f,i)=> setTimeout(()=>this.beep(f,0.16,'triangle',0.12), i*70));
  },
  goodPing(){ this.beep(1320,0.10,'sine',0.10); },
  radioBlip(){ // 依依的微弱无线电波
    if(!this.ctx||this.muted) return;
    const t=this.now(), src=this.ctx.createBufferSource(); src.buffer=this._noiseBuffer(0.3);
    const bp=this.ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=2200; bp.Q.value=8;
    const g=this.ctx.createGain(); g.gain.setValueAtTime(0,t);
    for(let i=0;i<6;i++){ g.gain.setValueAtTime(Math.random()*0.06,t+i*0.05); }
    g.gain.exponentialRampToValueAtTime(0.001,t+0.32);
    src.connect(bp); bp.connect(g); g.connect(this.sfxBus); src.start(t); src.stop(t+0.32);
    const o=this.ctx.createOscillator(); o.type='sine'; o.frequency.value=880;
    const og=this.ctx.createGain(); og.gain.setValueAtTime(0.05,t); og.gain.exponentialRampToValueAtTime(0.001,t+0.3);
    o.connect(og); og.connect(this.sfxBus); o.start(t); o.stop(t+0.3);
  },
  tickStart(){ // 倒计时滴答（每秒）
    if(!this.ctx) return; this.tickStop();
    let n=0;
    this._tickTimer=setInterval(()=>{ if(this.muted) return; n++;
      this.beep(n%5===0?1400:900, 0.05, 'square', 0.07);
    },1000);
  },
  tickStop(){ if(this._tickTimer){ clearInterval(this._tickTimer); this._tickTimer=null; } },
  klaxonStart(){ // 毒气警报：双音循环
    if(!this.ctx||this._klaxon) return;
    const o=this.ctx.createOscillator(), g=this.ctx.createGain(), lfo=this.ctx.createOscillator(), lg=this.ctx.createGain();
    o.type='sawtooth'; o.frequency.value=520;
    lfo.type='sine'; lfo.frequency.value=2.2; lg.gain.value=180; lfo.connect(lg); lg.connect(o.frequency);
    const f=this.ctx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=1400;
    g.gain.value=0; g.gain.setTargetAtTime(0.06,this.now(),0.4);
    o.connect(f); f.connect(g); g.connect(this.master);
    o.start(); lfo.start();
    this._klaxon={o,g,lfo};
  },
  klaxonStop(){ if(this._klaxon){ const k=this._klaxon; k.g.gain.setTargetAtTime(0,this.now(),0.3); setTimeout(()=>{try{k.o.stop();k.lfo.stop();}catch(e){}},800); this._klaxon=null; } },

  /* ---------------- 背景氛围乐 ---------------- */
  // 主题: 'cold'(序章/默认) 'tense'(监视) 'urgent'(倒计时) 'rift'(裂隙) 'sea'(光之海) 'silent'
  playTheme(name){
    if(!this.ctx) return;
    if(this.theme===name) return;
    this.theme=name;
    this._stopLayers(1.5);
    if(name==='silent') return;
    const t=this.now();
    const presets={
      cold:  {root:55, chord:[0,3,7,10], lpf:520, lfoRate:0.05, pad:'sawtooth', pulse:false},
      tense: {root:49, chord:[0,1,6,8], lpf:680, lfoRate:0.09, pad:'sawtooth', pulse:true, pulseRate:1.0},
      urgent:{root:48, chord:[0,3,6,9], lpf:900, lfoRate:0.0, pad:'square', pulse:true, pulseRate:2.0},
      rift:  {root:62, chord:[0,4,7,11,14], lpf:1600, lfoRate:0.2, pad:'sawtooth', pulse:false, swell:true},
      sea:   {root:60, chord:[0,4,7,11], lpf:1100, lfoRate:0.04, pad:'sine', pulse:false, sea:true},
    };
    const p=presets[name]||presets.cold;
    const baseFreq=f=>27.5*Math.pow(2,(f-21)/12); // MIDI->Hz
    // 和声垫
    p.chord.forEach((semi,i)=>{
      const o=this.ctx.createOscillator(), o2=this.ctx.createOscillator(), g=this.ctx.createGain(), pan=this.ctx.createStereoPanner?this.ctx.createStereoPanner():null;
      o.type=p.pad; o2.type=p.pad;
      const fr=baseFreq(p.root+semi); o.frequency.value=fr; o2.frequency.value=fr; o2.detune.value=8;
      const lp=this.ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=p.lpf; lp.Q.value=2;
      // 滤波器缓慢扫动
      if(p.lfoRate>0){ const lfo=this.ctx.createOscillator(), la=this.ctx.createGain(); lfo.type='sine'; lfo.frequency.value=p.lfoRate*(1+i*0.1); la.gain.value=p.lpf*0.45; lfo.connect(la); la.connect(lp.frequency); lfo.start(t); this.layers.push(lfo); }
      g.gain.value=0; g.gain.linearRampToValueAtTime(0.05/Math.sqrt(p.chord.length), t+3);
      o.connect(lp); o2.connect(lp); lp.connect(g);
      if(pan){ pan.pan.value=(i/(p.chord.length-1))*1.4-0.7; g.connect(pan); pan.connect(this.musicBus); pan.connect(this.reverbIn); }
      else { g.connect(this.musicBus); g.connect(this.reverbIn); }
      o.start(t); o2.start(t);
      this.layers.push(o,o2,g);
    });
    // 紧张脉冲（心跳/时钟）
    if(p.pulse){
      const pulseGain=this.ctx.createGain(); pulseGain.gain.value=0.0; pulseGain.connect(this.musicBus);
      const interval=1.0/(p.pulseRate||1);
      const id=setInterval(()=>{ if(!this.layers.length){clearInterval(id);return;} if(this.muted)return;
        const tt=this.now(), o=this.ctx.createOscillator(), g=this.ctx.createGain();
        o.type='sine'; o.frequency.setValueAtTime(baseFreq(p.root),tt); o.frequency.exponentialRampToValueAtTime(baseFreq(p.root)*0.5,tt+0.15);
        g.gain.setValueAtTime(0.10,tt); g.gain.exponentialRampToValueAtTime(0.001,tt+0.22);
        o.connect(g); g.connect(this.musicBus); o.start(tt); o.stop(tt+0.25);
      }, interval*1000);
      this._pulseId=id; this.layers._pulse=id;
    }
    // 裂隙：上扬噪声涌动
    if(p.swell){
      const src=this.ctx.createBufferSource(); src.buffer=this._noiseBuffer(8); src.loop=true;
      const bp=this.ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=900; bp.Q.value=0.7;
      const g=this.ctx.createGain(); g.gain.value=0; g.gain.linearRampToValueAtTime(0.05,t+4);
      const lfo=this.ctx.createOscillator(), la=this.ctx.createGain(); lfo.type='sine'; lfo.frequency.value=0.12; la.gain.value=600; lfo.connect(la); la.connect(bp.frequency); lfo.start(t);
      src.connect(bp); bp.connect(g); g.connect(this.musicBus); g.connect(this.reverbIn); src.start(t);
      this.layers.push(src,g,lfo);
    }
    // 海：温柔的浪声
    if(p.sea){
      const src=this.ctx.createBufferSource(); src.buffer=this._noiseBuffer(6); src.loop=true;
      const lp=this.ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=600;
      const g=this.ctx.createGain(); g.gain.value=0;
      const lfo=this.ctx.createOscillator(), la=this.ctx.createGain(); lfo.type='sine'; lfo.frequency.value=0.16; la.gain.value=0.035; lfo.connect(la); la.connect(g.gain); lfo.start(t);
      g.gain.setValueAtTime(0.04,t);
      src.connect(lp); lp.connect(g); g.connect(this.musicBus); g.connect(this.reverbIn); src.start(t);
      this.layers.push(src,g,lfo);
    }
  },
  _stopLayers(fade=1.0){
    if(this._pulseId){ clearInterval(this._pulseId); this._pulseId=null; }
    const t=this.now(), old=this.layers; this.layers=[];
    old.forEach(n=>{ try{
      if(n.gain){ n.gain.cancelScheduledValues(t); n.gain.setTargetAtTime(0,t,fade/3); }
    }catch(e){} });
    setTimeout(()=>{ old.forEach(n=>{ try{ if(n.stop) n.stop(); }catch(e){} }); }, fade*1000+200);
  },
};

   游戏状态 + 叙事引擎核心

const State = {
  compliance:100,   // 合规积分
  entropy:0,        // 熵能量（隐藏，结局C门槛）
  betrayed:false,   // 是否背叛过无辜亡者（封锁结局C）
  flags:{ ajiFormatted:false, ameliaHonored:false, k77Freed:false,
          freedomVbs:false, omegaCracked:false, lianTruth:false },
  chapter:'序章',
};
function setCompliance(d){
  State.compliance=Math.max(0,Math.min(100,State.compliance+d));
  const el=document.getElementById('sb-score'); el.textContent=State.compliance;
  el.style.color = State.compliance<60 ? 'var(--danger)' : '';
  if(d) flashScore(d);
}
function addEntropy(n){ State.entropy+=n; }
function flashScore(d){
  const el=document.getElementById('sb-score');
  const f=document.createElement('span'); f.textContent=(d>0?' +':' ')+d;
  f.style.cssText='color:'+(d>0?'var(--phosphor-bright)':'var(--danger)')+';font-size:11px;margin-left:4px;transition:opacity 1.4s';
  el.after(f); requestAnimationFrame(()=>{f.style.opacity='0';}); setTimeout(()=>f.remove(),1500);
}

// DOM 快捷
const $ = s=>document.querySelector(s);
const log = ()=>$('#log');
const desk = ()=>$('#desktop');
const screenEl = ()=>$('#screen');
function el(tag,cls,html){ const e=document.createElement(tag); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e; }
function scrollLog(){ const l=log(); l.scrollTop=l.scrollHeight; }
const sleep = ms=>new Promise(r=>setTimeout(r,ms));

// 打字机：逐字输出。点击/空格/回车：打字中→立即显示整行；显示完毕→推进到下一句
let _skip=false;
let _phase='idle';        // 'typing' | 'waiting' | 'idle'
let _advanceResolve=null;
function _doAdvance(){
  _skip=true;                                       // 结束当前正在打的字
  if(_phase==='waiting' && _advanceResolve){ _advanceResolve(); }  // 已显示完毕则推进
}
function _advance(){       // 行尾停顿：等待玩家点击后再继续
  return new Promise(res=>{
    const hint=el('div','conthint linehint','▼');
    hint.style.cssText='margin:1px 0 3px;text-align:right;color:var(--phosphor);opacity:.7;font-size:12px;letter-spacing:0;padding-right:6px';
    log().appendChild(hint); scrollLog();
    _phase='waiting';
    _advanceResolve=function(){ if(hint&&hint.parentNode) hint.remove(); _phase='idle'; _advanceResolve=null; res(); };
  });
}
function bindSkip(){
  desk().addEventListener('click', _doAdvance);
  document.addEventListener('keydown', function(e){ if(e.key===' '||e.key==='Enter'){ e.preventDefault(); _doAdvance(); } });
}
async function typeInto(node, text, cps=42){
  _skip=false;
  let i=0, last=0;
  const interval=1000/cps;
  return new Promise(res=>{
    function step(ts){
      if(_skip){ node.textContent=text; res(); return; }
      if(ts-last>=interval){
        last=ts;
        node.textContent=text.slice(0,++i);
        const ch=text[i-1];
        if(ch && ch.trim() && i%2===0) Audio.key();
        scrollLog();
        if(i>=text.length){ res(); return; }
      }
      requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  });
}

// 叙事原语 ----------------------------------------------------
async function sys(text,cls='sys',cps=46){
  const line=el('div','line '+cls); log().appendChild(line); scrollLog();
  _phase='typing';
  await typeInto(line,text,cps);
  await _advance();
}
function rawLine(html,cls='line dim'){ const l=el('div',cls,html); log().appendChild(l); scrollLog(); return l; }

async function speak(who,text,kind=''){
  const box=el('div','speak '+kind);
  box.appendChild(el('div','who',who));
  const t=el('div','txt'); box.appendChild(t);
  log().appendChild(box); scrollLog();
  _phase='typing';
  await typeInto(t,text, kind==='child'?30:40);
  await _advance();
}

async function mail(from,subject,bodyLines,tag='高优先级'){
  const m=el('div','mail');
  const hd=el('div','mail-hd');
  hd.innerHTML='<span><span class="mail-tag">'+tag+'</span> 发件人：'+from+'</span><span>'+nowDate()+'</span>';
  m.appendChild(hd);
  const bd=el('div','mail-bd'); bd.innerHTML='<div style="color:var(--amber);margin-bottom:8px">主题：'+subject+'</div>';
  const body=el('div'); bd.appendChild(body);
  m.appendChild(bd); log().appendChild(m); scrollLog();
  for(const ln of bodyLines){ const p=el('div'); p.style.marginBottom='6px'; body.appendChild(p); await typeInto(p,ln,50); await sleep(80); }
  await sleep(150);
}

// 等待玩家点击继续
function waitContinue(label='▼ 点击继续'){
  return new Promise(res=>{
    const h=el('div','conthint',label); log().appendChild(h); scrollLog();
    const go=()=>{ h.remove(); cleanup(); res(); };
    function cleanup(){ desk().removeEventListener('click',onClick); desk().removeEventListener('keydown',onKey); document.removeEventListener('keydown',onKey); }
    let armed=false; setTimeout(()=>armed=true,180); // 防止误触上一次点击
    const onClick=()=>{ if(armed) go(); };
    const onKey=e=>{ if(armed&&(e.key===' '||e.key==='Enter')){ e.preventDefault(); go(); } };

function logicGrid(title, intro, fragments, records){
  return new Promise(res=>{
    const p=openPanel();

    p.appendChild(el('div','p-desc',intro));

    const colR=el('div','grid-col'); colR.appendChild(el('h4','','■ 历史数据库 / 交叉比对'));
    let selFrag=null, done=0;
    const shuffled=records.slice().sort(()=>Math.random()-0.5);
    fragments.forEach(fr=>{
      const c=el('div','gcard'); c.dataset.id=fr.id;
      c.innerHTML='<span class="gc-corrupt">'+fr.corruptText+'</span>';
      c.onclick=()=>{ if(c.classList.contains('done'))return;

      colF.appendChild(c);
    });

      const c=el('div','gcard'); c.dataset.id=rec.id; c.textContent=rec.text;

          // 配对成功：修复碎片
          const fr=fragments.find(f=>f.id===rec.id);
          selFrag.innerHTML=fr.text; selFrag.classList.remove('sel'); selFrag.classList.add('done');
          c.classList.add('done'); Audio.beep(880,0.1,'triangle',0.11);
          selFrag=null; done++;
          if(done>=fragments.length){ Audio.unlock(); setTimeout(finish,500); }
        } else {
          Audio.error(); c.classList.add('bad'); selFrag.classList.add('bad');
          setTimeout(()=>{c.classList.remove('bad'); if(selFrag)selFrag.classList.remove('bad');},350);
          setCompliance(0); // 无惩罚，仅反馈

      };

      p.appendChild(cont); scrollLog();
    }
  });
}

/* =========================================================
   内嵌小游戏 3：音频解码器（频率调谐去噪）
   拖动滑块对准隐藏信号频率；锁定后还原真相音频。
   ========================================================= */
function audioDecoder(title, intro, targetHz, readoutText){
  return new Promise(res=>{
    const p=openPanel();
    p.appendChild(el('div','p-title',title));
    p.appendChild(el('div','p-desc',intro));
    const canvas=el('canvas','dec-wave'); canvas.width=600; canvas.height=140; p.appendChild(canvas);
    const lockBar=el('div','dec-lock'); const lockI=el('i'); lockBar.appendChild(lockI); 
    const row=el('div','dec-row');
    row.innerHTML='<label>载波频率</label>';
    const sld=el('input','slider'); sld.type='range'; sld.min='200'; sld.max='3000'; sld.step='1'; sld.value='2400';
    row.appendChild(sld);
    const freqRead=el('span','dec-readout'); freqRead.style.minWidth='86px';
    row.appendChild(freqRead);
    p.appendChild(row); p.appendChild(lockBar);
    const readout=el('div','dec-readout'); readout.textContent='信号锁定度：0%　·　调整频率以滤除杂音，捕捉残存意识的声纹。';
    p.appendChild(readout);

    // Web Audio：噪声 + 隐藏正弦音，距离目标越近越清晰
    let noiseSrc=null, sigOsc=null, noiseGain=null, sigGain=null, bp=null, running=true, lock=0;
    const ctx=Audio.ctx;
    if(ctx && !Audio.muted){
      noiseSrc=ctx.createBufferSource(); noiseSrc.buffer=Audio._noiseBuffer(4); noiseSrc.loop=true;
      bp=ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1500; bp.Q.value=0.8;
      noiseGain=ctx.createGain(); noiseGain.gain.value=0.10;
      noiseSrc.connect(bp); bp.connect(noiseGain); noiseGain.connect(Audio.sfxBus);
      sigOsc=ctx.createOscillator(); sigOsc.type='sawtooth'; sigOsc.frequency.value=targetHz*0.5;
      sigGain=ctx.createGain(); sigGain.gain.value=0.0;
      const sf=ctx.createBiquadFilter(); sf.type='lowpass'; sf.frequency.value=900;
      sigOsc.connect(sf); sf.connect(sigGain); sigGain.connect(Audio.sfxBus);
      noiseSrc.start(); sigOsc.start();
    }
    const cx=canvas.getContext('2d'); let phase=0;
    function update(){
      const f=+sld.value; const dist=Math.abs(f-targetHz); const tol=140;
      const closeness=Math.max(0,1-dist/900); // 0..1
      freqRead.textContent=f+' Hz';
      if(noiseGain) noiseGain.gain.setTargetAtTime(0.02+0.13*(1-closeness), Audio.now(), 0.1);
      if(sigGain) sigGain.gain.setTargetAtTime(0.16*Math.pow(closeness,2), Audio.now(), 0.1);
      if(dist<tol){ lock=Math.min(100,lock+1.4); } else { lock=Math.max(0,lock-2.0); }
      lockI.style.width=lock+'%';
      readout.textContent='信号锁定度：'+Math.round(lock)+'%　·　'+(dist<tol?'锁定中——保持频率…':'调整频率以滤除杂音…');
      if(lock>=100 && running){ running=false; finish(); }
    }
    sld.oninput=()=>{ Audio.key(); };
    function draw(){
      if(!cx) return;
      phase+=0.18;
      cx.fillStyle='#030a07'; cx.fillRect(0,0,600,140);
      const f=+sld.value; const closeness=Math.max(0,1-Math.abs(f-targetHz)/900);
      const css=getComputedStyle(document.documentElement);
      const col=css.getPropertyValue('--phosphor').trim()||'#36f0a0';
      cx.strokeStyle=col; cx.lineWidth=1.5; cx.beginPath();
      for(let x=0;x<600;x++){
        const clean=Math.sin(x*0.05+phase)*38*closeness;
        const noise=(Math.random()*2-1)*36*(1-closeness);
        const y=70+clean+noise;
        x===0?cx.moveTo(x,y):cx.lineTo(x,y);
      }
      cx.stroke();
      // 目标频带提示线
      const tx=((targetHz-200)/2800)*600;
      cx.strokeStyle='rgba(255,194,77,.35)'; cx.setLineDash([4,4]); cx.beginPath(); cx.moveTo(((f-200)/2800)*600,0); cx.lineTo(((f-200)/2800)*600,140); cx.stroke(); cx.setLineDash([]);
      if(running) requestAnimationFrame(draw);
    }
    const ticker=setInterval(update,50); draw();
    async function finish(){
      clearInterval(ticker);
      try{ if(noiseGain)noiseGain.gain.setTargetAtTime(0,Audio.now(),0.2); if(sigGain)sigGain.gain.setTargetAtTime(0,Audio.now(),0.3);
        setTimeout(()=>{ try{noiseSrc&&noiseSrc.stop(); sigOsc&&sigOsc.stop();}catch(e){} },600); }catch(e){}
      Audio.unlock();
      readout.innerHTML='<span class="warnline">✔ 信号锁定。正在还原录音…</span>';
      await sleep(700);
      const out=el('div'); out.style.cssText='border:1px solid var(--amber);border-radius:3px;padding:12px 14px;margin-top:10px';
      p.appendChild(out);
      for(const ln of readoutText){ const l=el('div','line '+(ln.cls||'warnline')); l.style.fontSize='13px'; out.appendChild(l); await typeInto(l, ln.t!=null?ln.t:ln, 44); await sleep(120); }
      const cont=el('button','choice'); cont.style.marginTop='16px'; cont.innerHTML='<span class="ck">[▶]</span> 继续';
      cont.onclick=()=>{ closePanel(p); res(); }; p.appendChild(cont); scrollLog();
    }
  });
}

/* =========================================================
   内嵌小游戏 4：控制台破解
   按提示依次选择正确指令推进解密；支持多阶段（量子防火墙）。
   stages: [{prompt, lines:[出现的输出], options:[{cmd, ok, reply, danger}]}]
   ========================================================= */
function consoleCrack(title, intro, stages){
  return new Promise(res=>{
    const p=openPanel();
    p.appendChild(el('div','p-title',title));
    p.appendChild(el('div','p-desc',intro));
    const term=el('div','term'); p.appendChild(term);
    const chips=el('div','cmd-chips'); p.appendChild(chips);
    let si=0;
    function out(text,cls='t-out'){ const l=el('div',cls,text); term.appendChild(l); term.scrollTop=term.scrollHeight; return l; }
    async function typeOut(text,cls='t-out'){ const l=el('div',cls); term.appendChild(l); await typeInto(l,text,90); term.scrollTop=term.scrollHeight; }
    async function loadStage(){
      const st=stages[si];
      for(const ln of st.lines){ await typeOut(ln.t!=null?ln.t:ln, ln.cls||'t-out'); await sleep(70); }
      chips.innerHTML='';
      st.options.forEach(opt=>{
        const c=el('button','chip'+(opt.danger?' danger':''),opt.cmd);
        c.onclick=async()=>{
          chips.querySelectorAll('button').forEach(b=>b.disabled=true);
          out(opt.cmd,'t-cmd');
          await sleep(180);
          if(opt.ok){
            Audio.beep(880,0.08,'triangle',0.10);
            for(const r of (opt.reply||[])){ await typeOut(r.t!=null?r.t:r, r.cls||'t-ok'); await sleep(60); }
            si++;
            if(si>=stages.length){
              await sleep(300); Audio.unlock();
              chips.innerHTML='';
              const cont=el('button','choice'); cont.style.cssText='max-width:240px;text-align:center';
              cont.innerHTML='<span class="ck">[▶]</span> 继续';
              cont.onclick=()=>{ closePanel(p); res(); };
              chips.appendChild(cont);
            }
            else { await sleep(400); loadStage(); }
          } else {
            Audio.error();
            for(const r of (opt.reply||['ACCESS DENIED · 防火墙重置该层。'])){ await typeOut(r.t!=null?r.t:r, r.cls||'t-err'); await sleep(60); }
            await sleep(400);
            chips.querySelectorAll('button').forEach(b=>b.disabled=false);
          }
        };
        chips.appendChild(c);
      });
    }
    loadStage();
  });
}

/* =========================================================
   倒计时控制器（物理抹除 300 秒）
   ========================================================= */
const Countdown = {
  remaining:0, timer:null, big:null,
  fmt(s){ const m=Math.floor(s/60), ss=s%60; return (m<10?'0':'')+m+':'+(ss<10?'0':'')+ss; },
  _render(){ const sb=$('#sb-timer'); if(sb) sb.textContent='T-'+this.fmt(this.remaining); if(this.big) this.big.textContent=this.fmt(this.remaining); },
  start(sec){
    this.remaining=sec;
    const sb=$('#sb-timer'); sb.classList.remove('hidden'); sb.classList.add('warn');
    this.big=el('div','bigtimer'); screenEl().appendChild(this.big);
    Audio.tickStart(); this._render();
  },
  // 视觉加速：每 stepMs 递减 stepSec，落到 stopAt 即停（不阻塞调用方）
  run(stepSec, stepMs, stopAt){
    if(this.timer) clearInterval(this.timer);
    this.timer=setInterval(()=>{
      this.remaining=Math.max(stopAt, this.remaining-stepSec);
      if(this.remaining<=20 && this.big) this.big.style.color='var(--danger-bright)';
      this._render();
      if(this.remaining<=stopAt){ clearInterval(this.timer); this.timer=null; }
    }, stepMs);
  },
  stop(){ if(this.timer){ clearInterval(this.timer); this.timer=null; } Audio.tickStop(); },
  hide(){ const sb=$('#sb-timer'); if(sb){ sb.classList.add('hidden'); sb.classList.remove('warn'); sb.textContent=''; }
          if(this.big&&this.big.parentNode) this.big.remove(); this.big=null; }
};

    restart.innerHTML='<span class="ck">[↻]</span> 重新登录 · 再玩一次';
    restart.onclick=()=>location.reload();
    sea.appendChild(restart);
    const tag=el('div'); tag.style.cssText='position:absolute;bottom:14px;left:0;right:0;text-align:center;color:var(--ocean);opacity:.7;font-size:11px;letter-spacing:4px';
    tag.textContent='结局 C — 光之海　·　ENDING C — SEA OF LIGHT';
    sea.appendChild(tag);
  }
}

/* =========================================================
   启动链 + 接线
   ========================================================= */
async function startGame(){
  try{
    await boot();
    await prologue();
    await chapter1();
    await chapter2();
    await chapter3();
  }catch(err){
    console.error(err);
    try{ rawLine('<span class="dangerline">[ 致命错误 ] '+(err&&err.message?err.message:err)+'</span>','line'); }catch(e){}
  }
}

(function init(){
  const powerScreen=$('#power'), powerBtn=$('#power-btn'), crt=$('#crt'), muteBtn=$('#mute');
  let started=false;

  function powerOn(){
    if(started) return; started=true;
    Audio.init(); Audio.resume();
    powerBtn.disabled=true; powerBtn.textContent='● 接通中…';
    setTimeout(()=>{
      powerScreen.classList.add('hidden');
      crt.classList.remove('hidden');
      bindSkip();
      startGame();
    }, 420);
  }
  powerBtn.addEventListener('click', powerOn);
  powerBtn.addEventListener('touchstart', function(e){ e.preventDefault(); powerOn(); }, {passive:false});

  function syncMute(m){
    muteBtn.style.opacity = m ? '0.4' : '';
    muteBtn.style.textDecoration = m ? 'line-through' : '';
    muteBtn.title = m ? '已静音（点击恢复声音）' : '声音开启（点击静音）';
  }
  muteBtn.addEventListener('click', function(){
    if(!Audio.ctx){ Audio.muted=!Audio.muted; syncMute(Audio.muted); return; }
    const m=Audio.toggleMute(); syncMute(m);
  });
})();
</script>
